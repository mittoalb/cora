# 2-BM beamline descriptor
#
# The single human-readable source describing the 2-BM beamline. The docs site
# renders a page from this file; later the integration tests load it, and later
# still a CORA seeder onboards the real beamline from it. This file is the
# definition; docs/deployments/2-bm/ explains it.
#
# How to read it: a walk along the beam, source to detector. Each entry pairs the
# human name with the EPICS handle a scientist already knows, plus its key specs.
#
# Two rules the shape encodes:
#   - Location is not identity. Where a device sits on this walk is separate from
#     which CORA Asset it is. Swap a camera or recoat a mirror and its place here
#     is unchanged.
#   - Grouping is presentation. The subsystem headings are not CORA objects; we
#     promote a heading to a real CORA group (a Component Asset or an Enclosure)
#     only when a feature needs to act on the whole group.
#
# Fields:
#   family    the CORA Family (device class)
#   pv        the EPICS handle (a string, or a map of named axes)
#   controller back-reference to the drive box in `controls` that moves this device
#   new       true when the device is not modeled in CORA yet
#   confirm   true or a note when a value here is from the docs / inferred, not
#             yet checked with 2-BM staff

beamline:
  name: "2-BM"
  facility: aps                 # APS, a Site-level Facility (facility_code: aps)
  sector: "Sector 2"            # organizational label, not a registered asset today
  tier: Unit
  parent: null
  drawing: "(ICMS, A342-RT1000, 02)"
  source: bending-magnet
  source_confirm: "post-APS-U multi-dipole fan, ~5.4 mrad"
  z_span_mm: [24020, 56764]     # front-end exit mask to photon stop
  z_span_confirm: true

enclosures:
  # The two hutches are Enclosures: access-gated volumes whose personnel-safety
  # permit gates beam-on work. Each sits within the APS Site (facility_code: aps),
  # a space inside a larger space, not an equipment pointer. Each device group
  # below names the Enclosure its devices are located in via `enclosure:`.
  # Each hutch's permit_signal is the post-migration PSS search-and-secure PV
  # (S02BM-PSS:Sta{A,B}:SecureM, confirmed PSS-1); see enclosures.md for the full PV set.
  - name: 2-BM-A
    role: optics-hutch
    facility_code: aps
    permit_signal: "S02BM-PSS:StaA:SecureM"   # 1 = searched/secured (PSS-1, post-migration)
  - name: 2-BM-B
    role: experiment-hutch
    facility_code: aps
    permit_signal: "S02BM-PSS:StaB:SecureM"   # 1 = searched/secured (PSS-1, post-migration)

# ===========================================================================
# The beam path: source -> detector
# ===========================================================================

front-end:
  stage: source
  enclosure: 2-BM-A
  intro: Where the beam enters and first gets gated.
  note: >
    The source devices are modelled as a flat set of Device Assets on the 2-BM
    Unit, not a Fixture: no Conditioner Role earns its place here (a mirror, a
    slit, and a filter share no common primitive verb), so unlike the Sample and
    Detector stages there is no Assembly to present a Role. See
    [the Catalog](../../catalog/index.md) on Roles and Affordances.
  devices:
    - name: source
      family: Beam              # Supply(kind=PhotonBeam); accelerator-side, provenance only
      new: true
      note: bending magnet, recorded as a Supply, not an Asset
    - name: Mask
      family: Mask
      passive: true
      water_cooled: true
      z_mm: 24020
      new: true
      vendor_designation: M3-24
      rss_tag: 02-BM-A-F-01
      aperture_mm: [44.4, 4.5]   # H x V; staff-corrected from the pre-APS-U 50 x 3 (ALIGN-2, #264)
      material: OFHC copper
      drawing: { system: ICMS, number: 4102020101-240000, revision: "(-)" }   # APS_2191941 row 1
      note: >
        Fixed front-end exit mask (M3-24), the permanent beam-defining aperture
        ~24 m from the source that the white-beam alignment routine centres on
        (item_012). Aperture 44.4 x 4.5 mm H x V, OFHC copper, water-cooled
        (ALIGN-2). Registering it as a child Asset rides with the
        passive-beam-path Window slice.
    - name: FrontEndWindow
      family: Window
      passive: true
      replaceable: true
      new: true
      window_count: 3
      be_thickness_total: 0.63 mm   # BEAM-2 (#246): W4-20 0.25 + W4-60 0.13 + unlabelled 0.25 (staff-verified)
      note: >
        Three OFHC-housed Be windows on the 02-BM beam path; per-window child
        Assets are deferred to the Window-Family slice. Source APS_2191941
        (post-APS-U) rows 5/8/9: W4-20 (drawing 4105090804-200000, z 28718,
        Be 0.25 mm), W4-60 (drawing 4105090804-600000, z 30804, Be 0.13 mm),
        and an unlabelled Be window (drawing 4102020106-400000, z 32417,
        Be 0.25 mm).
    - name: FrontEndShutter
      family: Shutter
      pv: "S02BM-PSS:FES"
      new: true
      confirm: true
      note: front-end safety shutter, gated by the personnel safety system; opened at session start and kept open throughout for optics thermal stability, not toggled per scan (BEAM-1)
    - name: vacuum_isolation
      family: Vacuum             # Supply(kind=Vacuum) observation, not a separate asset
      pv: { BIV: "2bm:BIV", gate_valves: [GV1, GV2, GV3] }
      new: true
      confirm: true
      note: valve open or closed state read as Supply status

conditioning-optics:
  stage: source
  enclosure: 2-BM-A
  intro: Shape the beam and pick its energy.
  devices:
    - name: ConditioningSlit
      family: Slit
      pv: { x_in: "2bma:m14", x_out: "2bma:m13", y_top: "2bma:m15", y_bot: "2bma:m16" }
      virtual_pv: { h_size: "2bma:Slit1Hsize", h_center: "2bma:Slit1Hcenter", v_size: "2bma:Slit1Vsize", v_center: "2bma:Slit1Vcenter" }
      controller: FrontEndDrive
      z_mm: 25225                  # from APS reference table APS_1404611 (BEAM-5)
      position_tolerance: "dx=dy=250 um, dz=5 mm"
      white_beam: true
      water_cooled: true
      note: >
        APS L3-20 four-blade slit (X+ outboard 2bma:m13, X- inboard 2bma:m14,
        Y+ up 2bma:m15, Y- down 2bma:m16); the Size/Centre calc records drive both
        blades of a pair together (calc records hosted on ioc2bmb1 despite the 2bma:
        prefix). Reference drawing L3200000-03. Names, structure, z, and tolerances
        confirmed BEAM-5 (#141).
    - name: Filter
      family: Filter
      pv: { upstream_paddle: "2bma:m17", downstream_paddle: "2bma:m18" }
      controller: FrontEndDrive
      foils_upstream: ["1 mm C", "150 um Al", "600 um Al", "1 mm Al", "None"]   # upstream paddle (2bma:m17), the OPERATIONAL selector today, in slot order; per-slot motor positions in the index_position_table calibration (see test_2bm_filter_foil_setup.py)
      foils_downstream: ["600 um Al", "150 um Al", "300 um C", "50 um C", "None"]   # downstream paddle (2bma:m18) bindings, still valid in the IOC though m18 is currently Faulted; positions in the index_position_table calibration
      note: >
        Two paddles, each modelled as a Filter_FoilSelector_* PseudoAxis facet
        with its own index_position_table calibration (test_2bm_filter_foil_setup.py).
        The upstream paddle (2bma:m17) is the operational filter selector today;
        the downstream (2bma:m18) failed 2026-06-19 (parked 107.19 mm, motor
        cannot actuate), modelled condition Faulted with its bindings retained
        (lifecycle stays Active). m18 is not expected to be repaired soon, so m17
        is the sole operational selector. Unit mm (caget 2bma:m18.EGU);
        materials/positions per docs2bm + 2filter_setup.adl (FOIL-1/FOIL-2).
    - name: DiagnosticFlag
      family: Screen
      pv: "2bma:m44"
      controller: FrontEndDrive
      z_mm: 32500
      note: >
        Motorized phosphor beam-viewing flag (the staff "diagnostic flag",
        item_006 / item_020): a vertical insert on 2bma:m44, on its own
        floor-referenced stand in 2-BM-A at z=32500 (FLAG-1, staff-confirmed).
        Raised into the beam in Mono at an energy-dependent height (the staff
        energy_move_flag table) and parked out (Y=0) in Pink; the Y is modelled
        as the energy-tracked DiagnosticFlag_Y PseudoAxis
        (test_2bm_energy_curves_setup.py). User offset: user = dial - 5 mm.
    - name: Mirror
      family: Mirror
      pv: { downstream_y: "2bma:m2", upstream_y: "2bma:m5", stripe_select: "2bma:m3" }
      controller: FrontEndDrive
      material: Si
      length: 0.993 m
      water_cooled: true
      replaceable: true          # APS-U spare exists
      stripes: ["5 nm Pt", "W/Si x50 (b)", "W/Si x50 (c)", "W/Si x50 (d)"]  # recoatable
      confirm: true
      note: per docs2bm the stripe selector (2bma:m3) is energy- and mode-dependent (Mono holds it at m3 about 1.0; Pink sweeps it per energy with a coordinated table-X move on 2bma:m1/m4), not a free discrete pick. The page gives a partial Pink m3-position-vs-energy table (30 keV -> 3.039, 40 -> 13.0, 50 -> 39.0, 60 -> 49.0 mm) but NOT which named stripe (a/b/c/d) sits at which position, nor the full saved set (MIRROR-1, MODE-3); CORA models it with the beam-mode work (deferred), not as a filter-style index axis
    - name: MirrorTable
      family: Table
      pv: "2bma:table1"
      support_motors: [M0X, M0Y, M1Y, M2X, M2Y, "Z (along beam)"]
      geometry: "SRI support table (table_full IOC); virtual record 2bma:table1"
      confirm: true
      note: in operational use (STAGE-7); carries the Y3-30 mirror. X axes (M0X=2bma:m1, M2X=2bma:m4) driven by the energy-change IOC for stripe selection. The M1Y support-motor slot is a known IOC substitution error (mapped to the in-vacuum stripe-selector 2bma:m3, not a table Y); bind only the table-X surface until 2bm-docs#171 is fixed. AX=pitch, AY=yaw, AZ=roll (STAGE-9).
    - name: Monochromator
      family: Monochromator
      pv:
        bragg_arm_upstream: "2bma:m30"     # dmm_us_arm
        bragg_arm_downstream: "2bma:m31"   # dmm_ds_arm
        m2_offset_y: "2bma:m32"            # dmm_m2_y, beam-exit-offset compensation
        crystal2_z: "2bma:m8"              # dmm M2 Z; second-crystal setup translation, NOT energy-driven
      controller: FrontEndDrive
      material: Si multilayer
      crystal_z_mm: [29335, 29934]
      confirm: true
      note: >
        Energy is set by the energy-change IOC as a discrete coordinated move:
        saved per-energy positions for the whole DMM are stored (store_0) and
        driven together to a configured set of energies (Mono 13.374, 13.574,
        18.0, 20.0, 25.0, 25.584 keV). The per-energy DMM axes are the Bragg
        arms (bragg_arm_upstream/downstream) and the M2 vertical offset
        compensator (m2_offset_y); crystal2_z (M2 Z) is a setup translation the
        IOC does NOT drive. The m25-m29 tank/alignment motors ARE in the
        coordinated move but are re-asserted at fixed values, not varied per
        energy (staff-confirmed ENERGY-5: m25/m28 are constant alignment X in
        both modes, m26/m27/m29 are two-state in-beam vs retracted by mode), so
        CORA carries energy curves for the Bragg arms and m2_offset_y alone.
        CORA models each per-axis relationship as a continuous
        curve interpolating the saved points. Two beam modes (MODE-1): in Mono
        the DMM is inserted (the per-energy axes above); in Pink the DMM Y motors
        drive out (about -10, beam passes straight through) and the Bragg arms
        park, with the mirror coating stripe setting the high-energy cutoff. Pink
        configured energies: 30, 40, 50, 60 keV. The exact Mono<->Pink insert and
        bypass positions and any required sequence are unconfirmed (MODE-2).
        Source: docs2bm item_020.

beam-defining-and-safety:
  stage: source
  enclosure: 2-BM-B
  intro: Admit the beam to the experiment hutch and reshape it.
  note: >
    The P6-50 stack sits physically AFTER the optics above (z 33343), but it is
    grouped here by function (safety), not by strict z-order. That exception is
    deliberate and called out rather than silently reordered. The P6-50 stack,
    including the SBS shutter, is assigned to 2-BM-B: it is the safety stack that
    gates the experiment hutch, so its devices are located_in 2-BM-B.
  devices:
    - name: SafetyStack
      family: SafetyStack
      z_mm: 33343
      new: true
      confirm: true
      constituents:
        - name: StationShutter   # B-station safety shutter (SBS); distinct role from the front-end FES (FrontEndShutter)
          family: Shutter
          pv: "S02BM-PSS:SBS"
          material: "W 21 mm"
          aperture_mm: [60.0, 44.5]
          drawing: { system: ICMS, number: 41050401-410003, revision: "(-)" }   # BEAM-3 (#247): P6-50 safety-shutter element; assembly drawing 41050401-500000; RSS 02-BM-A-P-01; source APS_2191941 row 10
          replaceable: true
          confirm: true
          note: >
            This SBS is the operator-side "fast shutter" at 2-BM-B (no separate
            fast actuator exists today). TomoScan cycles it closed for dark and
            white (flat) fields and open for projections, many times per scan;
            open before a run starts (operator-opened at session start). No
            separate FastShutter Asset is modelled (BEAM-1).
        - name: BeamStop
          family: BeamStop
          passive: true
          water_cooled: true
          new: true
        - name: Collimator
          family: Collimator
          passive: true
          new: true
        - name: Baffle
          family: Baffle
          passive: true
          new: true
    - name: SampleSlit
      family: Slit
      pv: { y_top: "2bma:m9", y_bot: "2bma:m10", x: ["2bma:m11", "2bma:m12"] }
      virtual_pv: { h_size: "2bma:Slit2Hsize", h_center: "2bma:Slit2Hcenter", v_size: "2bma:Slit2Vsize", v_center: "2bma:Slit2Vcenter" }
      controller: FrontEndDrive
      z_mm: 50500                  # from layout drawing A342-RT1000-02 (BEAM-5)
      position_tolerance: "dx=dy=250 um, dz=5 mm"
      note: >
        APS L3-20 four-blade slit at the sample-hutch entrance; reuses the A-side
        class. The vertical pair also tracks the per-energy beam position (see the
        SampleSlit_Vertical* PseudoAxes). Names, structure, z, and tolerances
        confirmed BEAM-5 (#141). CAVEAT: on the 2slit.adl screen the horizontal
        "Inb"/"outboard" labels are FLIPPED vs the physical direction (the detector
        image is mirrored left/right), so bind 2bma:m11/m12 to the X+/X- blades by
        PHYSICAL convention (positive X outboard), NOT the on-screen label.
        Reference drawing L3200000-03.
    - name: BeamPositionMonitor
      family: Diagnostic
      new: true
      confirm: true
      note: mono-mode only, held out of beam in pink mode
    - name: Aperture
      family: Aperture
      controller: ApertureFineDrive
      z_mm: 51300                    # 2-BM-B, between SampleSlit (50500) and the sample tower (~52-54 m), upstream of the sample (PIEZO-1, #241)
      new: true
      note: >
        Coded-aperture mask stepped through positions in the beam for
        compressive-sensing / dithered-sampling tomography, fine-positioned in X/Y by
        ApertureFineDrive (two NV200D units via a nanoSXY 120 CAP flexure). Registered
        identity-only: the spatial code pattern and any beam-effect (encoded
        transmission) are deferred with the path reserved, per the passive-beam-path tier
        discipline. Distinct from Slit (a variable four-blade opening) and Mask (a fixed
        passive aperture): this is a fixed-pattern mask actively positioned.
    - name: AlignmentCamera
      family: Camera
      pv: "2bma:m21"
      controller: FrontEndDrive
      new: true
      confirm: true
      note: >
        Semi-permanent A-station beam-view camera (FLIR Oryx 5MP, IOC
        2bmbOryx5MP on host lyra) on a vertical stage 2bma:m21. Permanently
        installed but rarely engaged (annual / multi-year, for major
        realignment): the beam reaches it only when an operator manually breaks
        vacuum and removes an upstream pipe section. A distinct unit from the
        B-station microscope Camera; exact part likely ORX-10G-51S5M, pending
        operator confirmation (ALIGN-1). The rare-engagement is a note, not a
        new lifecycle state.

sample-environment:
  stage: sample
  enclosure: 2-BM-B
  intro: Hold and rotate the sample. Listed bottom to top (the kinematic stack).
  devices:
    - name: SampleTable
      family: Table
      pv: { y: "2bmb:m24", z: "2bmb:m20", upstream_x: "2bmb:m21", downstream_x: "2bmb:m22" }
      note: pure translation, four motors addressed directly with no combined table.db virtual record; only Y is moved routinely; sits on a Vibraplane isolation base and carries the hexapod stack. Registered as the SampleTower base (#126); axis layout confirmed STAGE-7/8
    - name: Hexapod
      family: Hexapod
      model: aerotech_hex300   # Aerotech HEX300-230HL
      pv: "2bmHXP:"
      # Operator EPICS channels per axis (item_020). The unit has six DoF; today
      # only four are exposed as operator channels. Z (m3) and Yaw (m6) exist on
      # the hexapod but are not wired as operator channels in 2-BM's current EPICS.
      axis_channels: { X: "2bmHXP:m1", Y: "2bmHXP:m2", Pitch: "2bmHXP:m4", Roll: "2bmHXP:m5" }
      controller: HexapodDrive
      replaceable: true
      serial_number: "486060-01"   # operator-confirmed (#156)
      travel: "x 55 mm, y 60 mm, z 25 mm, a 15 deg, b 15 deg, c 30 deg"
      drawing: { system: EDMS, number: Hex300-Data-Sheet, revision: D20250203 }
    # Kohzu goniometer/swivel. Staff item_020 confirms it is a SEPARATE stage (not the hexapod pitch),
    # and it is PERMANENTLY installed (tomo vs lamino is a tilt setpoint, not an insert/remove).
    # Working model SA16A-RM (operator); sources also list SA16A-RS / SA07A-R2L, confirm (questions STAGE-6).
    - name: LaminographyPitch
      family: TiltStage           # rotational limited-range tilt (Kohzu goniometer); not LinearStage, not RotaryStage (a tilt carries no PSO Following/Marking). Modelled in the SampleTower Assembly (#126)
      model: kohzu_sa16a
      pv: "2bmb:m49"
      range: 0..20 deg
    - name: Wedge
      family: Wedge
      passive: true
      replaceable: true
      angle: -10 deg            # carried as a spec; was encoded in the old name, lands in settings at modeling
      new: true
    - name: Rotary
      family: RotaryStage         # the rotation axis (theta)
      model: aerotech_abrs250mp   # Aerotech ABRS-250MP-M-AS, air-bearing (part number corrected from ABS250MP-M-AS typo, #156)
      pv: "2bmb:m102"
      controller: RotaryDrive
      trigger_source: PSO         # position-synchronized output drives the camera
      replaceable: true
      serial_number: "146853-A-1-1-X"           # operator-confirmed (#156)
      drawing: { system: EDMS, number: 630C2125, revision: "(-)" }   # Aerotech vendor per-unit drawing (#156)
      datasheet: "https://de.aerotech.com/wp-content/uploads/2021/01/abrs.pdf"   # ABRS series datasheet, 2021-01 (#164)
      range: -360..360 deg
      max_speed: 720 deg/s               # operational soft limit at 2-BM (config on 2bmb:m102); the datasheet hardware max is max_speed_datasheet below
      max_speed_datasheet: 3000 deg/s    # ABRS-250MP datasheet, 500 rpm (#164)
      encoder_resolution: 0.000676 deg   # item_050 Ensemble encoder table: 532800 pulses/rev (11840 lines/rev x 45) = 360/532800 deg/count; replaces an earlier unsourced 0.0001 deg (questions STAGE-10)
      # ABRS-250MP datasheet specs (#164):
      aperture: 35 mm                    # clear aperture; the 250 in ABRS-250MP is the stage width designator, not the aperture
      accuracy_rotation: 2 arcsec        # calibrated accuracy, +/-2 arc sec
      repeatability_rotation: 1 arcsec   # bidirectional, < 1 arc sec
      load_capacity_axial: 66 kg
      load_capacity_radial: 36 kg
      load_capacity_tilt: 28 Nm          # max tilt moment
      stage_mass: 15.6 kg
      # Rotary kit per 2-BM staff source (pre-APSU ops/item_100 "Rotary Stages"). ABRS-250MP-M-AS is the
      # currently-installed 2-BM-B rotary (manual/item_020). Mode/station labels ("fast tomo"/"mona tomo"/
      # "spindle") and whether the swap is a live loadout variant conflict pre vs post APSU; confirm (questions STAGE-5).
      interchangeable_with: ["ABRS-150MP-M-AS", "ABS2000-1000AS-RU"]
      confirm: true
    - name: SampleTop_X
      family: LinearStage
      model: kohzu_cyat070
      pv: "2bmb:m18"
      controller: SampleStageDrive
      range: -10..10 mm
      max_speed: 1 mm/s
      encoder_resolution: 0.0005 mm
    - name: SampleTop_Z
      family: LinearStage
      model: kohzu_cyat070
      pv: "2bmb:m17"
      controller: SampleStageDrive
      range: -10..10 mm
      max_speed: 1 mm/s
      encoder_resolution: 0.0005 mm
    - name: Hexapod_Roll
      family: PseudoAxis          # virtual DoF over the hexapod kinematics
    - name: Hexapod_Pitch
      family: PseudoAxis

detector:
  stage: detection
  enclosure: 2-BM-B
  intro: Convert the transmitted beam to light and record it (the Microscope detector, a scintillator-relay-camera assembly).
  cora: Assembly(Microscope) composed of the reusable Optics sub-assembly (turret, objectives, objective selector, propagation distance) plus camera and scintillator leaf slots, anchored to a Housing. Fixture(microscope_at_2bm) presents as a Detector
  placement: Mount + Frame (2BM_hutch_frame)
  note: >
    Two cameras are installed (item_020): the FLIR Oryx 5 MP (Camera, pv 2bmSP1:)
    and a FLIR Oryx 31 MP (Camera_HighRes, pv 2bmSP2:), selected by the Camera_Selector
    (a Schunk LPTM 30 translation stage with folding mirrors, pv 2bmb:m5). The
    second camera, the selector, and the per-camera rotation motors (2bmb:m7/m8)
    are recorded here as real devices; registering them as CORA Assets is a
    follow-on slice (so they carry new: true today).
  devices:
    - name: DetectorTable
      family: Table
      pv: { x: "2bmb:table3.X", y: "2bmb:table3.Y", z: "2bmb:table3.Z", ax: "2bmb:table3.AX", ay: "2bmb:table3.AY", az: "2bmb:table3.AZ" }
      support_motors: { M0X: "2bmb:m13", M0Y: "2bmb:m14", M1Y: "2bmb:m12", M2X: "2bmb:m10", M2Y: "2bmb:m9", M2Z: "2bmb:m11" }
      geometry: "SRI: 3 Y-supports, 2 X-supports, 1 Z-support; six virtual axes (three linear X/Y/Z, three angular AX/AY/AZ) computed from six support motors via virtual record 2bmb:table3"
      confirm: true
      note: carries the Optique Peter Z stage and the microscope; the detector Z-rail alignment procedure drives the angular axes table3.AX and table3.AY. AX=pitch, AY=yaw, AZ=roll (STAGE-9; the source-legend vs procedure conflict was resolved in favour of the procedure). Registered as a CORA Asset (test_2bm_optical_tables_setup.py)
    - name: Housing
      family: Housing      # the microscope housing (containment anchor)
      model: optique_peter_micrx080
      pv: "2bm:MCTOptics:"
      new: true
    - name: Turret
      family: LinearStage         # sliding ball-screw objective selector (item_020), not a rotating turret
      model: nanotec_st4118  # motor is a Nanotec stepper (item_020, ST4118M1404-B), not Optique Peter; ball-screw 2 mm/rev
      pv: "2bmb:m1"               # on the ioc2bmb OMS VME58 crate (SampleStageDrive); MCTOptics commands it from the (lens x camera) lookup, never driven directly (DET-2, DET-11)
      controller: SampleStageDrive
      range: -60.3784..59.2300 mm     # selector positions in mm, operator-verified across both cameras 2026-06-19 (DET-11)
      drawing: { system: EDMS, number: MAN-11863, revision: 0521-0465-A }
    - name: Objective_10x
      family: Objective
      magnification: 10.0
      numerical_aperture: 0.28
      working_distance: 33.5 mm
      replaceable: true
      drawing: { system: EDMS, number: MAN-11863, revision: 0521-0465-A }
      calibrations:
        - name: cal_objective_10x_mag
          quantity: magnification
          operating_point: { objective_designation: "10x_Mitutoyo", energy: 25 }
          value: 9.83
          source: AssertedSource
          status: Provisional
    - name: Objective_2x
      family: Objective
      magnification: 2.0
      numerical_aperture: 0.055
      working_distance: 34 mm
      replaceable: true
      drawing: { system: EDMS, number: MAN-11863, revision: 0521-0465-A }
      calibrations:
        - name: cal_objective_2x_mag
          quantity: magnification
          operating_point: { objective_designation: "2x_Mitutoyo", energy: 25 }
          value: 2.0
          source: AssertedSource
          status: Provisional
    - name: Objective_1.1x
      family: Objective
      magnification: 1.1
      numerical_aperture: 0.03
      working_distance: 50 mm
      replaceable: true
      drawing: { system: EDMS, number: MAN-11863, revision: 0521-0465-A }
      calibrations:
        - name: cal_objective_1.1x_mag
          quantity: magnification
          operating_point: { objective_designation: "1.1x_Mitutoyo", energy: 25 }
          value: 1.10
          source: AssertedSource
          status: Provisional
    - name: Objective_Selector
      family: PseudoAxis          # virtual lens picker; CORA writes LensSelect, MCTOptics owns the (lens x camera) turret/rotation/focus lookup (DET-2, DET-11)
      pv: "2bm:MCTOptics:LensSelect"
      readback_pv: "2bm:MCTOptics:LensSelected"
      slot_labels_pv: ["2bm:MCTOptics:LensName0", "2bm:MCTOptics:LensName1", "2bm:MCTOptics:LensName2"]
      lens_slots: ["1.1x_Mitutoyo", "2x_Mitutoyo", "10x_Mitutoyo"]   # LensSelect index 0/1/2 (DET-11 slot order, operator-verified 2026-06-19)
      turret_lookup_mm:            # 2bmb:m1 position per (lens x camera); MCTOptics resolves it, CORA never drives 2bmb:m1 (DET-11)
        camera0: { "1.1x_Mitutoyo": -59.8184, "2x_Mitutoyo": -0.5734, "10x_Mitutoyo": 58.8707 }   # Camera0LensPos{0,1,2}; Camera 0 = 5 MP, in beam
        camera1: { "1.1x_Mitutoyo": -60.3784, "2x_Mitutoyo": -0.9240, "10x_Mitutoyo": 59.2300 }   # Camera1LensPos{0,1,2}; Camera 1 = 31 MP
      coupled_lookups:             # two further per-(lens, camera) lookups fire on the same LensSelect/CameraSelect change; MCTOptics-owned, not CORA Assets (DET-11)
        camera_rotation_pv: { camera0: "2bmb:m7", camera1: "2bmb:m8" }   # Camera{N}Lens{M}Rotation, 6 PVs, rotation-axis preservation
        per_lens_focus_pv: ["2bmb:m2", "2bmb:m3", "2bmb:m4"]            # Camera{N}Lens{M}Focus, 6 PVs, degenerate (camera0 == camera1) today
      note: >
        The lens picker (item_020 MCTOptics). CORA writes the high-level
        LensSelect, and CameraSelect on the Camera_Selector below; MCTOptics then
        resolves the turret position (2bmb:m1), the per-camera rotation offset
        (2bmb:m7 for Camera 0, 2bmb:m8 for Camera 1), and the per-lens focus
        (2bmb:m2/m3/m4) from a joint (lens x camera) lookup: 18 calibration PVs
        over six motors, all firing on any LensSelect or CameraSelect change. The
        turret position depends on BOTH lens AND camera (DET-11, operator-verified
        2026-06-19); a lens-only model would silently break rotation-axis
        alignment whenever the camera is switched. CORA drives only LensSelect and
        CameraSelect, never the six underlying motors. The PseudoAxis partition
        rule (test_2bm_microscope_setup.py) carries the Camera 0 column as a
        single-camera provenance record; the full 2D table is documentary here,
        and true 2D actuation waits for the control-layer slice.
    - name: PropagationDistance
      family: LinearStage         # sample-to-detector distance (propagation) rail, not a focus stage; per-lens fine focus is on 2bmb:m2/m3/m4 (LENS0/1/2_FOCUS, item_020, MCTOptics), offsets in software
      model: aerotech_pro225sl
      pv: "2bmbAERO:m1"
      controller: PropagationDistanceDrive
      travel: 1000 mm
      motor: { part: "Aerotech BM250_UF", type: "AC servo, 240 VAC", serial_number: "234848-07" }   # motor inside the stage, distinct from the PropagationDistanceDrive electronics (#156)
      confirm: false
      note: 2bmbAERO:m1 sets the sample-to-detector distance (propagation distance) for inline phase contrast; confirmed not a focus motor (DET-10, staff issue + 2bm-docs 5eb45b3). Per-lens fine focus is separate (2bmb:m2/m3/m4, MCTOptics; DET-2)
      drawing: { system: EDMS, number: MAN-11863, revision: 0521-0465-A }
    - name: Scintillator
      family: Scintillator
      material: LuAG
      thickness: 100 um
      decay_time: 0.07 us
      replaceable: true           # Consumable, swapped between sizes
      pv: "2bm:MCTOptics:ScintillatorType"
      confirm: true
      drawing: { system: EDMS, number: MAN-11863, revision: 0521-0465-A }
      calibrations:
        - name: cal_scintillator_eff_thickness
          quantity: effective_thickness
          operating_point: { scintillator_material: "LuAG", energy: 25 }
          value: "100 um"
          source: AssertedSource
          status: Provisional
    - name: Camera
      family: Camera              # camera 0 (the modeled camera)
      model: flir_oryx
      pv: "2bmSP1:"
      sensor: Sony IMX250 CMOS global shutter, 2448 x 2048 pixel   # DET-8 (#142)
      pixel_size: 3.45 um
      bit_depth: 12 bit
      max_framerate_hz: 162
      readout_mode: GlobalShutter
      serial_number: "19173710"
      firmware_version: "1710.0.0.0"
      part_number_reported: "Oryx ORX-10G-51S5M"   # IOC-reported; catalog SKU ORX-10G-51S5M-C is the same class (10G vs 10GS = form factor only)
      replaceable: true
    - name: Camera_HighRes
      family: Camera             # camera 1 (item_020): FLIR Oryx 31 MP, the alternate detector selected by Camera_Selector
      model: flir_oryx_31mp
      model_reported: "Oryx ORX-10G-310S9M"        # DET-8 (#142): per-unit identity confirmed
      pv: "2bmSP2:"
      serial_number: "22150530"
      firmware_version: "1904.0.72.0"
      pixel_size: 3.45 um        # shared with the 5 MP Oryx (staff 2bm-procedures)
      note: >
        Registered identity-only. item_020 (Detection) confirms the sensor as
        6464 x 4852 px at 26 fps (3.45 um pitch, mono); bit depth, sensor kind,
        and readout mode remain pending (DET-13). The Camera schema requires
        bit_depth with the sensor group, so settings stay unapplied until that
        lands. The validated detector_z_rail_alignment procedure ran on this camera.
    - name: Camera_Selector
      family: LinearStage        # Schunk LPTM 30 translation stage + folding mirrors, selects camera 0/1 (item_020)
      model: schunk_lptm_30
      pv: "2bmb:m5"              # on the ioc2bmb OMS VME58 crate (SampleStageDrive)
      controller: SampleStageDrive
      note: "Schunk LPTM 30; saved positions Pos.0=20, Pos.1=15. Registered identity-only; LinearStage settings pending."
    - name: DetectorWindow
      family: Window
      passive: true
      replaceable: true
      new: true
  decommissioned:                 # provenance only, not active assets
    - PCO Dimax HS
    - Adimec Quartz Q-12A180

# ===========================================================================
# Cross-cutting: serves many groups at once, so it sits outside the beam walk
# ===========================================================================

controls:
  intro: >
    The drive-electronics boxes and trigger hardware. Driven stages above point
    back here via their controller field.
  motion_controllers:
    - name: RotaryDrive
      family: MotionController
      model: aerotech_ensemble_ml          # Aerotech ENSEMBLE ML 10-40-IO-MXH (Multi-Loop); corrected from HLe (#162 DRIVE-4)
      protocol: Aerotech_Native
      axis_count: 1
      serial_number: "730792/1"            # operator-confirmed (#161); firmware still pending (DRIVE-2)
      chassis: RotaryDriveChassis          # the ML drive card sits in this chassis (#162 DRIVE-4)
    - name: RotaryDriveChassis
      family: Housing
      model: aerotech_tm3a
      serial_number: "160591-A-1-1"        # operator-confirmed (#162 DRIVE-4)
      order_number: "730578"
      drawing: { system: EDMS, number: 630D2079, revision: H }   # operator label "630D2079 REV-H"; "REV" stripped per the Rotary 630C2125 precedent
      note: "Aerotech TM3-A power/distribution chassis: DC bus (two 20V segments) + integrated 24V PS24-1 supply, US 115VAC input, Aeronet distribution to the ML drive cards via slots C1ML/C2ML. Houses the RotaryDrive card."
    - name: HexapodDrive
      family: MotionController
      model: aerotech_automation1_ixr3   # Aerotech Automation1-iXR3, separate rack (#156)
      protocol: Aerotech_Native
      axis_count: 6
      serial_number: "486125-01"         # operator-confirmed (#156); firmware still pending (DRIVE-2)
    - name: PropagationDistanceDrive
      family: MotionController
      model: aerotech_ensemble_hle         # Aerotech Ensemble HLe 10-40-A-IO-MXH, 2bmbAERO IOC (#162 DRIVE-4, operator-confirmed 2026-06-16)
      protocol: Aerotech_Native
      axis_count: 1
      serial_number: "228849-02"           # operator-confirmed (#161); firmware still pending (DRIVE-2)
    - name: SampleStageDrive
      family: MotionController
      model: oms_vme58
      protocol: OMS_VME
      axis_count: 91
      note: b-station crate (ioc2bmb), drives 2bmb:m1-m91 including the sample stages
    - name: FrontEndDrive
      family: MotionController
      model: oms_vme58
      protocol: OMS_VME
      axis_count: 91
      note: "a-station crate (ioc2bma); drives the front-end + optics band and also the B-station SampleSlit (2bma:m9-m12). Named for its primary band; the full driven set spans both hutches and lives in the EPICS channel map, not the name."
    # NV100D (formerly the provisional OpticsFineDrive): physically present with IOC
    # support (arcturus, IOC JenaNV100D) but NOT in operational use at 2-BM, because the
    # NV100D lacks the external trigger mode tomoscan fly-scan needs, so no Run/Procedure
    # drives it. Recorded as provenance, not modeled as an active controller (PIEZO-1, #241).
    - name: ApertureFineDrive
      family: MotionController
      model: piezosystem_jena_nv200d
      protocol: EPICS                # arcturus host, IOC JenaNV200D; Xon/Xoff flow control
      axis_count: 2
      ip_addresses: { x: "10.54.113.126", y: "10.54.113.125" }   # two NV200D units, one per axis (PIEZO-4, #244)
      note: >-
        Two independent Piezosystem Jena NV200D/NET single-channel controllers (one per
        axis, separate IPs above) that fine-position the Aperture coded-mask via a
        nanoSXY 120 CAP XY flexure stage (part T-223-06D, 120 um nominal / 100 um
        closed-loop per axis, 12.5 mm clear aperture; PIEZO-2, #242). FPGA-triggered step
        mode advances a preloaded position list (1024-position buffer max, n=256 default,
        --random for compressive-sensing dithered sampling). The driven X/Y LinearStage
        axis Assets are deferred to a follow-up slice; the out2/out3 -> X/Y cable map
        still needs operator confirmation (PIEZO-5). Renamed from the provisional
        SampleFineDrive: it does NOT move the sample (PIEZO-1, #241).
  triggering:
    - name: Timing
      family: TimingController
      pv: "2bmbMZ1:SG:"
      firmware_version: "2.0"   # softGlueZynq gateware (bitstream) version, from the softGlueZynqMenu.adl header (#271)
      path: "{PSO, trigILF} -> MUX2-1 -> GateDly1 -> camera Line2; out2 -> JenaX (GateDly-3_DLY); out3 -> JenaY (GateDly-2_DLY)"
      # MUX2-1 is a 2:1 selector: input0 = raw PSO train, input1 = trigILF (a chosen subset of PSO pulses); routed per scan via MUX2-1_SEL_Signal (item_060)
      replaceable: true
      confirm: true
  software_iocs_not_modeled:
    # Software processes, not hardware. They belong to the Plan/Method wiring layer
    # and are referenced only by PV prefix, never registered as Assets.
    [ioc2bma, ioc2bmb, energy, MCTOptics, table_full, 2filter]

resources:
  intro: >
    Continuously-available resources (the Supply BC) and the field-swappable parts
    inventory. Both described once here and referenced from the walk above.
  supplies:
    - kind: PhotonBeam
    - kind: CoolingWater          # observed via Flow1-Flow8 BLEPS channels
    - kind: Vacuum                # observed via IP1-7, IG1-8, VS1-7, GV1-3
    - kind: Power
    - kind: ComputePool
    - kind: LiquidNitrogen        # 2-BM detector LN2 dewar
  # No standing 2-BM gas-mix or compressed-air Supply (SUP-1/SUP-2, #268): sample
  # gas is per-experiment, ESAF-gated (bottles, typically He/N2/Ar), so it is a
  # Run-level fact not a beamline Supply; compressed air is the APS facility shop-air
  # line with no beamline-local spec. Facility-scope ProcessGas stays in aps/site.yaml.
  replaceable_parts:
    # One selector, since CORA has no single asset-revision concept:
    #   recoatable surface  -> Consumable affordance, no separate asset
    #   swappable w/ identity -> Exchange (reversible) or Retire (terminal) via Fixture
    #   passive shim/window  -> Fixture-attached part or Consumable; shelf spare = asset, no fixture
    recoatable: ["mirror coating stripes", "DMM multilayers"]
    swappable_with_identity: ["objectives", "camera", "scintillator", "rotary stage"]
    passive: ["fixed -10deg wedge", "filter foils", "Be windows", "vitreous-carbon window"]
