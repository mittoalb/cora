# CORA Site descriptor: the Australian Synchrotron site-level surface
#
# The Australian Synchrotron (operated by ANSTO, the Australian Nuclear Science and
# Technology Organisation) is the sixth Site CORA models, and its first Australian
# facility. This file is the single human-readable source for the facility's
# site-level instances: the Facility itself, the Practices it would run, and the
# facility principals. It is the home of the MX3 macromolecular-crystallography
# beamline.
#
# Status: reverse-engineered. CORA has not been connected to the Australian
# Synchrotron and no staff have confirmed this model. Every value below is read from
# public open source (the AustralianSynchrotron/mx3-beamline-library device library)
# or inferred, and is carried as `pending` until staff confirm it. Do not invent
# facility specifics here; carry them as questions on the MX3 open-questions page.
#
# Source-of-truth boundary (same as the APS / MAX IV / Diamond / NSLS-II / SLAC sites):
#   - the closed facility-kind / actor-kind vocabularies are validated against
#     code-mirrored frozensets in scripts/site_descriptor.py.
#   - the facility records the bootstrap invariants (kind=Site, display_name equals
#     code); `heading` carries the human title used on the rendered page.
#
# Controls house-style (the distinctive Site fact): MX3 is EPICS-PV-bound at the
# facility level (literal in-code PVs, the storage ring at SR11*, the beamline at
# MX3*), but it drives three first-class non-EPICS control planes: the MD3
# microdiffractometer over the MXCuBE Exporter protocol (TCP), the DECTRIS Eiger over
# the SIMPLON REST API, and the ISARA sample robot over a TCP client library. CORA's
# ControlPort spans all four planes; see docs/deployments/mx3/equipment/controls.md.

facility:
  code: as
  display_name: as
  heading: "Australian Synchrotron"
  kind: Site
  institution: ANSTO (Australian Nuclear Science and Technology Organisation)
  beamlines: [MX3]

# ISA-88 Site Recipes: the facility-adapted form of a catalog Method. All pending
# because they are reverse-engineered from the mx3-beamline-library, not yet confirmed
# with Australian Synchrotron staff. MX3's rotation-MX techniques reuse the same
# pending cross-facility Methods Diamond i03 introduced (mx_data_collection, grid_scan,
# sample_exchange), none yet in the catalog (TECH-1 / ROBOT-1).
practices:
  - {name: MX3_mx_data_collection_practice, method: mx_data_collection, pending: true, note: "rotation / oscillation MX data collection on the MD3 microdiffractometer goniometer + the DECTRIS Eiger; reuses the i03 Method, not yet in the catalog (TECH-1)"}
  - {name: MX3_grid_scan_practice, method: grid_scan, pending: true, note: "fast grid scan for sample location / centring on the MD3 (TECH-1)"}
  - {name: MX3_sample_exchange_practice, method: sample_exchange, pending: true, note: "unattended ISARA robot load / centre / collect / unmount loop; a Procedure over the spine + a Subject custody thread (ROBOT-1)"}

# Access BC Actors conceptually facility-wide at the Australian Synchrotron. Pending
# until the operator and review structure is confirmed; the device library exposes no
# human roster.
actors:
  - {name: Australian Synchrotron beamline staff, kind: human, pending: true, note: "operator and beamline-scientist pool; structure TBD (GOV-1)"}
  - {name: Australian Synchrotron safety review, kind: human, pending: true, note: "facility safety review body; membership TBD"}

# Agent BC Agents seeded at this deployment. None declared: the CORA system agents are
# not yet wired for an Australian Synchrotron deployment.
agents: []

# Supply BC: facility-wide continuously-available resources. Pending in this
# reverse-engineered model. LiquidNitrogen is the Cryojet cryostream supply.
supplies:
  - {name: Storage-ring beam current, kind: PhotonBeam, pending: true}
  - {name: Cooling water, kind: CoolingWater, pending: true}
  - {name: Beamline vacuum, kind: Vacuum, pending: true}
  - {name: Cryojet liquid nitrogen, kind: LiquidNitrogen, pending: true}

# Safety BC: facility-issued Clearances. The Australian Synchrotron PSS form names are
# not in the device library (only the PSS photon-shutter enable / status PVs at
# MX3FE01SHT01 / MX3BLSH01SHT01); carried pending rather than guessed.
clearances:
  - {name: Australian Synchrotron personal safety system, kind: PSS, pending: true, note: "facility safety-form and permit-leaf names TBD; confirm with staff (PSS-1)"}

# Caution BC: operator tribal knowledge. Beamline-level cautions reverse-engineered
# for MX3 would live on docs/deployments/mx3/, not here.
cautions: []
