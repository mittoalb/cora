# CORA Site descriptor: the APS site-level surface
#
# The single human-readable source for one facility's site-level instances:
# the Facility, the Practices registered there, and the facility principals
# (Actors and Agents). The docs build renders the APS site pages from this file.
#
# Source-of-truth boundary (see the docs-rewrite plan):
#   - the closed facility-kind / actor-kind vocabularies are validated against
#     code-mirrored frozensets in scripts/site_descriptor.py (enum-equality
#     tested), never re-authored here.
#   - agents MIRROR the code seeds (cora/agent/seed.py + seed_caution_drafter.py);
#     a drift-guard test asserts equality, so this list cannot silently fall out
#     of step with what the deployment actually seeds.
#   - the facility records the bootstrap invariants (kind=Site, display_name
#     equals code); a test pins those.
#   - practices and actors have no global code seed (they live only in
#     integration-test scenarios); this file is their consolidated source,
#     guarded by the round-trip test.

facility:
  code: aps
  display_name: aps
  kind: Site
  institution: Argonne
  sectors: [Sector 2, Sector 4, Sector 7, Sector 8, Sector 9, Sector 32, Sector 19]
  beamlines: [2-BM, 2-ID, 7-BM, 32-ID, 19-BM, 4-ID, 8-ID, 9-ID, 12-ID-E]

# ISA-88 Site Recipes: the facility-adapted form of a catalog Method. A method
# that exists in the Catalog renders as a link; a method still pending in the
# Catalog renders unlinked.
practices:
  - {name: APS_standard_dark_field_practice, method: dark_field}
  - {name: APS_motor_homing_practice, method: motor_homing}
  - {name: 2BM_resolution_practice, method: resolution_alignment}
  - {name: 2BM_focus_practice, method: focus_alignment}
  - {name: 2BM_alignment_practice, method: center_alignment}
  - {name: 2BM_roll_practice, method: roll_alignment}
  - {name: 2BM_pitch_practice, method: pitch_alignment}
  - {name: 2BM_dark_field_practice, method: dark_field}
  - {name: 2BM_flat_field_practice, method: flat_field}
  - {name: 2BM_sensitivity_characterization_practice, method: sensitivity_characterization}
  - {name: 2BM_hexapod_reboot_practice, method: hexapod_reboot}
  - {name: 2BM_tomography_practice, method: tomography}
  - {name: 2BM_streaming_tomography_practice, method: streaming_tomography}
  - {name: 2BM_mosaic_practice, method: mosaic_tomography}
  - {name: 2BM_continuous_rotation_practice, method: continuous_rotation_tomography}
  - {name: 2BM_multi_energy_practice, method: tomography}
  - {name: Per-objective focus variant, method: focus_alignment, pending: true, note: "Mitutoyo 1.1x / 2x / 10x objectives"}
  - {name: Per-objective resolution variant, method: resolution_alignment, pending: true, note: "Mitutoyo 1.1x / 2x / 10x objectives"}
  - {name: 2BM_energy_characterization_practice, method: energy_characterization}
  - {name: 2BM_ioc_restart_practice, method: ioc_restart, pending: true}
  - {name: 2BM_mirror_recoat_practice, method: mirror_recoat_return, pending: true}
  # 7-BM Practices (design phase). Tomography reuses the existing catalog Methods;
  # the white-beam techniques reference Methods not yet in the catalog (they render
  # unlinked) and are carried pending until the technique enters the pilot scope (TECH-1).
  - {name: 7BM_tomography_practice, method: tomography, pending: true, note: "reuses the 2-BM tomoScan tomography Method"}
  - {name: 7BM_high_speed_imaging_practice, method: high_speed_imaging, pending: true, note: "white-beam chopper-gated movie bursts; Method not yet in catalog (TECH-1)"}
  - {name: 7BM_radiography_practice, method: radiography, pending: true, note: "focused-beam time-resolved point radiography; Method not yet in catalog (TECH-1)"}
  - {name: 7BM_energy_dispersive_diffraction_practice, method: energy_dispersive_diffraction, pending: true, note: "white-beam EDD; Method not yet in catalog (TECH-1)"}
  # 19-BM-FACT (Sector 19) is pre-build; its Practices are the same portable
  # tomography Methods adapted for the new beamline, carried pending until the
  # beamline is operating. White-beam only: no energy or mono practices.
  - {name: 19BM_first_light_practice, method: first_light, pending: true, note: "19-BM-FACT design phase"}
  - {name: 19BM_dark_field_practice, method: dark_field, pending: true, note: "19-BM-FACT design phase"}
  - {name: 19BM_flat_field_practice, method: flat_field, pending: true, note: "19-BM-FACT design phase"}
  - {name: 19BM_tomography_practice, method: tomography, pending: true, note: "19-BM-FACT design phase"}
  - {name: 19BM_continuous_rotation_practice, method: continuous_rotation_tomography, pending: true, note: "19-BM-FACT high-throughput autonomous CT"}
  - {name: 19BM_streaming_tomography_practice, method: streaming_tomography, pending: true, note: "19-BM-FACT design phase"}
  # 2-ID (Sector 2) is a scanning fluorescence microprobe beamline, pre-build for
  # CORA; the modelled hutch is 2-ID-D. Its technique is a new modality (point-
  # raster XRF), distinct from the projection-tomography Methods above, so its
  # Method is not yet in the catalog; the practice renders unlinked, pending (METHOD-1).
  - {name: 2ID_scanning_fluorescence_microscopy_practice, method: scanning_fluorescence_microscopy, pending: true, note: "2-ID-D sample-scanning XRF mapping; Method not yet in catalog (METHOD-1)"}
  # 4-ID POLAR Practices (first cut). POLAR is a diffraction / magnetism /
  # polarization beamline; its Methods are not in the imaging-heritage catalog and
  # render unlinked, carried pending until a technique enters the pilot scope (TECH-1).
  - {name: 4ID_diffraction_practice, method: diffraction, pending: true, note: "single-crystal X-ray diffraction on the Huber diffractometers; Method not yet in catalog (TECH-1)"}
  - {name: 4ID_magnetic_scattering_practice, method: magnetic_scattering, pending: true, note: "resonant magnetic scattering in field and at low temperature; Method not yet in catalog (TECH-1)"}
  - {name: 4ID_xmcd_practice, method: xmcd, pending: true, note: "X-ray magnetic circular dichroism via the phase retarders; Method not yet in catalog (TECH-1)"}
  - {name: 4ID_resonant_scattering_practice, method: resonant_scattering, pending: true, note: "energy-resonant scattering across an absorption edge; Method not yet in catalog (TECH-1)"}
  # 8-ID XPCS Practices (first cut). Coherent-scattering correlation spectroscopy
  # and the 8-ID-E diffraction; Methods not in the imaging-heritage catalog, render
  # unlinked, carried pending until a technique enters scope (TECH-1).
  - {name: 8ID_xpcs_practice, method: xpcs, note: "X-ray photon correlation spectroscopy; coherent-scattering time series on the area detectors"}
  - {name: 8ID_saxs_practice, method: small_angle_scattering, pending: true, note: "small-angle scattering on the XPCS detectors; Method not yet in catalog (TECH-1)"}
  - {name: 8ID_diffraction_practice, method: diffraction, pending: true, note: "six-circle diffraction at 8-ID-E; shares the 4-ID diffraction Method (TECH-1)"}
  # 9-ID CSSI Practices (first cut). Coherent surface scattering at grazing
  # incidence; Methods not in the imaging-heritage catalog, render unlinked,
  # carried pending until a technique enters scope (TECH-1).
  - {name: 9ID_coherent_surface_scattering_practice, method: coherent_surface_scattering, pending: true, note: "coherent surface scattering at grazing incidence; the CSSI signature; Method not yet in catalog (TECH-1)"}
  - {name: 9ID_gisaxs_practice, method: grazing_incidence_scattering, pending: true, note: "grazing-incidence small- and wide-angle scattering (GISAXS / GIWAXS); Method not yet in catalog (TECH-1)"}
  - {name: 9ID_xpcs_practice, method: xpcs, note: "surface XPCS on the coherent detectors; shares the 8-ID XPCS Method"}
  - {name: 9ID_waxs_practice, method: wide_angle_scattering, pending: true, note: "wide-angle scattering on the GIWAXS detector; shares the i22 WAXS Method (TECH-1)"}
  # 12-ID-E USAXS Practices (first cut). Bonse-Hart crystal-analyzer
  # ultra-small-angle scattering plus pinhole SAXS and WAXS; Methods not in the
  # catalog, carried pending until a technique enters scope (USAXS-1, TECH-1).
  - {name: 12IDE_usaxs_practice, method: ultra_small_angle_scattering, pending: true, note: "Bonse-Hart rocking-curve ultra-small-angle scattering on the autoranging photodiode; new Capability not yet in catalog (USAXS-1)"}
  - {name: 12IDE_saxs_practice, method: small_angle_scattering, pending: true, note: "pinhole small-angle scattering on the SAXS area detector; shares the i22 SAXS Method (TECH-1)"}
  - {name: 12IDE_waxs_practice, method: wide_angle_scattering, pending: true, note: "wide-angle scattering on the WAXS area detector; shares the i22 WAXS Method (TECH-1)"}

# Access BC Actors that are conceptually facility-wide at APS. Actor display
# names live in actor_profile (the PII vault), not in event-sourced Actor state.
# Beamline-bound staff (the 2-BM operator pool) live with their beamline.
actors:
  - {name: APS Operator, kind: human}
  - {name: Run Debrief, kind: agent}
  - {name: APS Experiment Safety Review Board, kind: human}
  - {name: 2-BM Beamline Scientist, kind: human}
  - {name: 19-BM Beamline Scientist, kind: human, pending: true, note: "19-BM-FACT (Sector 19), pre-build; operator pool TBD"}
  - {name: Proposal 2026-1234 PI, kind: human}
  - {name: Proposal 2026-1235 PI, kind: human}
  - {name: Proposal 2026-1236 PI, kind: human}
  - {name: Proposal 2026-1237 PI, kind: human}
  - {name: Sample-of-opportunity PI, kind: human}
  - {name: Named APS scientific staff, kind: human, pending: true, note: "cross-beamline duties"}
  - {name: Real ESRB membership, kind: human, pending: true, note: "vs committee-as-actor"}
  - {name: 7-BM Beamline Scientist, kind: human, pending: true, note: "7-BM beamline-bound staff"}
  - {name: 2-ID Beamline Scientist, kind: human, pending: true, note: "2-ID scanning fluorescence microprobe (Sector 2), 2-ID-D hutch; pre-build, operator pool TBD"}
  - {name: 4-ID Beamline Scientist, kind: human, pending: true, note: "4-ID POLAR beamline-bound staff; operator pool TBD"}
  - {name: 8-ID Beamline Scientist, kind: human, pending: true, note: "8-ID XPCS beamline-bound staff; operator pool TBD"}
  - {name: 9-ID Beamline Scientist, kind: human, pending: true, note: "9-ID CSSI beamline-bound staff; operator pool TBD"}

# Agent BC Agents seeded at this deployment. Each Agent's id is shared with an
# Access BC Actor (kind=agent) via a cross-BC atomic write. This list mirrors
# the code seeds and is drift-guarded against them.
agents:
  - {name: RunDebriefer, kind: RunDebriefer, version: 1.0.0, model_provider: anthropic, model_name: claude-haiku-4-5}
  - {name: CautionDrafter, kind: CautionDrafter, version: 1.0.0, model_provider: anthropic, model_name: claude-sonnet-4-6}
  - {name: RunSupervisor, kind: RunSupervisor, version: 1.0.0, model_provider: deterministic, model_name: "agent:RunSupervisor:v1", pending: true, note: "rule-based in-loop supervisor; identity seeded, runtime not yet operational"}
  - {name: CautionPromoter, kind: CautionPromoter, version: 1.0.0, model_provider: deterministic, model_name: "agent:CautionPromoter:v1", pending: true, note: "deterministic auto-promoter of Notice-only caution proposals; identity seeded, subscriber not yet operational"}
  - {name: ClearanceExpirer, kind: ClearanceExpirer, version: 1.0.0, model_provider: deterministic, model_name: "agent:ClearanceExpirer:v1", pending: true, note: "deterministic in-loop expirer of Active clearances past valid_until; identity seeded, runtime not yet operational"}
  - {name: ClearanceWatcher, kind: ClearanceWatcher, version: 1.0.0, model_provider: deterministic, model_name: "agent:ClearanceWatcher:v1", pending: true, note: "deterministic flag-only watcher of stalled front-of-lifecycle clearances (Submitted/UnderReview/Approved); identity seeded, runtime not yet operational"}
  - {name: RunInitiator, kind: RunInitiator, version: 1.0.0, model_provider: deterministic, model_name: "agent:RunInitiator:v1", pending: true, note: "deterministic agent that autonomously starts Runs; identity seeded, autonomous loop not yet operational (slice 2)"}

# Supply BC: facility-wide continuously-available resources whose availability the facility tracks.
supplies:
  - {name: APS liquid helium, kind: LiquidHelium}
  - {name: Storage-ring beam current, kind: PhotonBeam, pending: true}
  - {name: Liquid nitrogen, kind: LiquidNitrogen, pending: true}
  - {name: Gas mixtures, kind: ProcessGas, pending: true, note: sample environments}
  - {name: 7-BM compressed air, kind: CompressedAir, pending: true, note: "high-volume plant for 7-BM flow and combustion experiments"}
  - {name: 7-BM vacuum system, kind: Vacuum, pending: true, note: "rotary-claw vacuum for 7-BM flow experiments"}

# Safety BC: facility-issued Clearances. Each carries a facility safety-form kind and binds to one
# or more aggregates or external references.
clearances:
  - {name: Facility umbrella, kind: ESAF, binding: APS Site Asset}
  - {name: Per-experiment ESAFs, kind: ESAF, pending: true, note: per-proposal Subject + Run}
  - {name: Synchrotron access, kind: SAF, pending: true}
  - {name: Door interlocks, kind: DOOR, pending: true}
  - {name: 7-BM flammable-gas experiment ESAF, kind: ESAF, pending: true, note: "per-experiment authorization for 7-BM combustion / flammable-gas work; whether a hazard workflow beyond ESAF is needed is HAZ-1"}

# Caution BC: operator tribal knowledge carried on a facility-level target.
cautions:
  - {target: APS Site Asset, category: OperationalWindow, severity: Notice, text: "Top-up injections cause brief beam-flux transients (~0.5s) every few minutes"}
  - {target: APS Site Asset, text: "Storage-ring scheduled downtimes", pending: true}
  - {target: Shared optics, text: "Calibration drift on shared optics", pending: true}
  - {target: 7-BM beam path, text: "White beam can crack scintillators and damage samples; filter and use the chopper to limit duty cycle", pending: true}
  - {target: 7-BM sample environment, text: "Flammable-gas and combustion handling; ventilated cabinet, low-volume delivery line", pending: true}
  - {target: 7-BM sample environment, text: "Oxygen-deficiency hazard from inert and process-gas flows", pending: true}
