# CORA Beamline descriptor: 32-ID (APS), design phase
#
# 32-ID is a canted insertion-device beamline at APS (Argonne). It is bound to
# the APS Site (deployments/aps/site.yaml), the same Site as the 2-BM pilot.
#
# STATUS: design phase. This scaffold models only what the published 32-ID docs
# (github.com/decarlof/32id-docs) state with confidence: the shared optics-hutch
# spine and the transmission X-ray microscope (TXM) endstation in 32-ID-C. Every
# device carries `new: true` (not yet modelled in CORA) and `confirm: true`
# (value to be verified with 32-ID staff), because the source corpus mixes
# pre-APS-U and current values. Control handles (`pv`) and vendor `model`s are
# omitted on purpose: PV names are not published and parts are not catalogued, so
# none are invented. Devices bind to catalog Families where one fits, or to a
# loose Family string (rendered as plain text) where the device class is genuinely
# new and not yet earned into the catalog (the TomoWISE HeatAbsorber precedent).
#
# DELIBERATELY OUT OF THIS SCAFFOLD (recorded on docs/deployments/32-id/model.md,
# not modelled here): the 32-ID-B white-beam high-speed imaging (HSI) and
# ultrafast white-beam diffraction (HSID) instruments; the additive-manufacturing
# (AM) powder-bed-fusion laser rig; and the in-house projection microscope (PM,
# still "space holder" in the source docs). These leave CORA's tomography and
# imaging heritage (diffraction, an actuated laser, a robotic sample changer) and
# are owner-scope decisions, not staff facts.
#
# THE CANTED QUESTION (TOPO-1): 32-ID is canted, two undulators in one straight
# section feeding two experimental branches (32-ID-B white beam, 32-ID-C mono).
# Whether the 32-ID-A optics below are shared by both branches or duplicated
# per-branch, and which undulator feeds which branch, is the single structural
# unknown. This scaffold models one root Unit Asset and one optics train, and
# flags the multiplicity as TOPO-1 rather than committing to two roots.
#
# Items the docs leave open are tagged inline with a (QUESTION-ID) answered on
# docs/deployments/32-id/questions.md.

beamline:
  name: 32-ID
  facility: aps                 # APS, the Site-level Facility (facility_code: aps)
  sector: "Sector 32"           # organizational label, not a registered asset
  tier: Unit
  parent: null
  source: insertion-device
  source_confirm: "canted pair of planar undulators (downstream Planar 1.35, upstream Planar 2.8; U33 tuning curve published); the two feed the two branches, mapping unconfirmed (TOPO-1, SRC-1)"
  z_span_mm: [24000, 70000]     # front-end mask (~24 m) to C-hutch detector; approximate (LAYOUT-1)
  z_span_confirm: "approximate; the published layout gives no single z reference (LAYOUT-1)"

# Three lead-shielded stations, all rated for white and mono beam. 32-ID-A holds
# beam-defining optics only (no experiments); 32-ID-B and 32-ID-C are the two
# experimental hutches. PSS permit signals are APS facility signals, not yet on
# file (PSS-1). 32-ID-B is declared because it is a real access-gated hutch, but
# its instruments (HSI, AM) are out of this scaffold (see model.md).
enclosures:
  - name: 32-ID-A
    role: optics-hutch
    facility_code: aps
    permit_signal: {confirm: "APS PSS search-and-secure signal TBD (PSS-1)"}
  - name: 32-ID-B
    role: experiment-hutch
    facility_code: aps
    permit_signal: {confirm: "APS PSS search-and-secure signal TBD (PSS-1)"}
  - name: 32-ID-C
    role: experiment-hutch
    facility_code: aps
    permit_signal: {confirm: "APS PSS search-and-secure signal TBD (PSS-1)"}

# ===========================================================================
# SOURCE STAGE: the 32-ID-A optics spine, shared by both branches (TOPO-1)
# ===========================================================================

insertion-devices:
  stage: source
  enclosure: 32-ID-A
  branch: A-shared
  intro: "The canted source: two planar undulators in one straight section, angled apart to feed the two experimental branches. The U33 tuning curve is published; exact device types and which undulator feeds which branch are unconfirmed."
  note: >
    Modelled as two InsertionDevice Assets for the canted pair. The downstream
    and upstream labels follow the published source table; the planar-period and
    U33 relationship are carried as SRC-1, the branch mapping as TOPO-1.
  devices:
    - name: Undulator_DS
      family: InsertionDevice
      new: true
      confirm: true
      device_type: planar-undulator
      label: "Planar 1.35 (downstream source)"
      note: "downstream canted undulator; feeds one branch (TOPO-1)"
    - name: Undulator_US
      family: InsertionDevice
      new: true
      confirm: true
      device_type: planar-undulator
      label: "Planar 2.8 (upstream source)"
      note: "upstream canted undulator; feeds the other branch (TOPO-1)"

front-end:
  stage: source
  enclosure: 32-ID-A
  branch: A-shared
  intro: "The fixed beam-defining mask, front-end window, and white-beam slits that shape and condition the beam before the monochromator."
  note: >
    Mask is a shared catalog Family; BeamStop is a loose Family string (not yet
    in the catalog), as at 2-BM. JJ X-Ray slits are a four-motor compact slit set
    on a Beckhoff controller (manual_002).
  devices:
    - name: FrontEndMask
      family: Mask
      z_mm: 24000
      new: true
      confirm: true
      note: "fixed beam-defining aperture; size and exact position unconfirmed (SRC-2)"
    - name: FrontEndWindow
      family: Window
      new: true
      confirm: true
      note: "front-end window (Be assumed); count and thickness unconfirmed (SRC-2)"
    - name: WhiteBeamSlit
      family: Slit
      new: true
      confirm: true
      mechanism: "four motors: per dimension one sets aperture size, one sets position"
      note: "JJ X-Ray compact high-precision slits on a Beckhoff controller (manual_002); the primary slits lose calibration on IOC restart (troubleshoot_002)"

optics-hutch:
  stage: source
  enclosure: 32-ID-A
  branch: A-shared
  intro: "The Si(111) monochromator and the P4-50 mode shutter that select between white-beam and monochromatic operation. The monochromator serves the monochromatic branch; in white-beam mode it is bypassed."
  note: >
    The white-to-mono switch is a coordinated, safety-interlocked move (the P4-50
    mode shutter plus a white-beam stop and combined monochromatic stops,
    safety_001). Whether CORA models it as a new Capability or as an extension of
    the existing energy_change vocabulary is an owner decision (see model.md);
    the world-fact half is MODE-1.
  devices:
    - name: Monochromator
      family: Monochromator
      new: true
      confirm: true
      crystal: Si(111)
      energy_range: 7 to 40 keV
      note: "double-crystal monochromator; bypassed in white-beam mode; per-axis motors and saved positions unconfirmed (MONO-1)"
    - name: ModeShutter
      family: Shutter
      new: true
      confirm: true
      note: "P4-50 mode shutter selecting white-beam vs monochromatic mode; switching sequence and interlock unconfirmed (MODE-1, safety_001)"
    - name: WhiteBeamStop
      family: BeamStop
      new: true
      confirm: true
      note: "white-beam stop positioned and locked per mode change (safety_001); loose Family pending the passive beam-path tier"
    - name: MonochromaticBeamStop
      family: BeamStop
      new: true
      confirm: true
      note: "combined monochromatic-beam stops set per mode change (safety_001); loose Family"

safety-shutters:
  stage: source
  enclosure: 32-ID-A
  branch: A-shared
  intro: "The personnel-safety shutters between the optics hutch and the experimental hutches, gated by the PSS."
  note: "PSS permit signals TBD (PSS-1)."
  devices:
    - name: StationShutter
      family: Shutter
      new: true
      confirm: true
      note: "safety shutter gating beam into the experimental hutches; PV TBD (PSS-1)"

# ===========================================================================
# SAMPLE STAGE: the TXM endstation in 32-ID-C (the one instrument scaffolded)
# ===========================================================================

txm-endstation:
  stage: sample
  enclosure: 32-ID-C
  branch: C
  intro: "The in-house transmission X-ray microscope (TXM): a granite-supported sample stage carrying the rotation axis and the zone-plate optics for in-situ nano-tomography. This is 32-ID's tomography instrument and the one endstation this scaffold models."
  note: >
    The published TXM overview mixes pre-APS-U and current hardware (TXM-1), so
    every device is carried confirm. The TXM-specific optics (condenser, objective
    zone plate, phase ring) are bound to loose Family strings: they are genuinely
    new device classes not yet in the catalog and are NOT coined as catalog
    Families here (no Asset is registered yet to earn them). Their optical details
    are OPTICS-1..3.
  devices:
    - name: TXMGranite
      family: Table
      z_mm: 64000
      new: true
      confirm: true
      note: "granite stage support carrying the TXM sample system and optics (TXM overview labels 1, 4, 5)"
    - name: TXMRotary
      family: RotaryStage
      new: true
      confirm: true
      note: "tomographic rotation axis (Aerotech assumed); model and encoder unconfirmed (TXM-1)"
    - name: TXMSamplePositioning
      family: LinearStage
      new: true
      confirm: true
      note: "sample centring and alignment stack (Kohzu assumed); axes and travel unconfirmed (TXM-1)"
    - name: Condenser
      family: Condenser
      new: true
      confirm: true
      note: "beam-condensing optic upstream of the sample (capillary or condenser zone plate); type unconfirmed (OPTICS-1). Loose Family"
    - name: ZonePlate
      family: ZonePlate
      new: true
      confirm: true
      note: "objective Fresnel zone plate forming the magnified image; outermost-zone width and diameter unconfirmed (OPTICS-2). Loose Family"
    - name: PhaseRing
      family: PhaseRing
      new: true
      confirm: true
      note: "Zernike phase ring for phase contrast, inserted or retracted (txm img phase_ring_out); details unconfirmed (OPTICS-3). Loose Family"

# ===========================================================================
# DETECTION STAGE: the TXM detector chain in 32-ID-C
# ===========================================================================

txm-detector:
  stage: detection
  enclosure: 32-ID-C
  branch: C
  intro: "The TXM indirect-detection chain: a scintillator, microscope objective, and camera on a granite-supported detector stack, downstream of a flight path that reduces air scatter."
  note: >
    Reuses the existing detector Families (Scintillator, Objective, Camera,
    Housing). The flight path is helium-filled in the projection microscope; for
    the TXM the path-gas and flight-tube details are unconfirmed (SUP-1).
  devices:
    - name: TXMDetectorSupport
      family: Table
      new: true
      confirm: true
      note: "granite detector support and follower mechanics (TXM overview labels 3, 10)"
    - name: TXMObjective
      family: Objective
      new: true
      confirm: true
      note: "visible-light microscope objective coupling the scintillator image to the camera; magnification set unconfirmed (DET-2)"
    - name: TXMScintillator
      family: Scintillator
      new: true
      confirm: true
      note: "converts the X-ray image to visible light; material and thickness unconfirmed (DET-2)"
    - name: TXMCamera
      family: Camera
      new: true
      confirm: true
      note: "detector camera; model, sensor, and frame rate unconfirmed (DET-1)"

# Cross-cutting control. 32-ID runs EPICS (the floor); CORA observes and, where
# it replaces TomoScan-style orchestration, conducts over it. Control handles are
# not published, so none are bound (CTRL-1).
controls:
  intro: >
    32-ID runs on EPICS, like 2-BM. The drive crates, IOC hosts, and PV handles
    for each device are not published in the source docs and are left unbound
    (CTRL-1). The TXM is operated from the TXMTWO workstation, reachable remotely
    over delos.aps.anl.gov (manual_005).

# Continuously-available resources a run draws on (design phase).
resources:
  intro: >
    The continuously-available facility resources a 32-ID run needs. Carried
    pending in the design phase; the flight-path gas (helium) is unconfirmed for
    the TXM (SUP-1).
  supplies:
    - kind: PhotonBeam
    - kind: CoolingWater
    - kind: Vacuum
