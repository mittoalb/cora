repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Syntax-only parse so mkdocs.yml's !!python/name tags
        # (used by pymdownx.superfences for Mermaid) don't fail
        # the safe loader. Does not execute Python constructors.
        args: [--unsafe]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Order matters: check (with --fix) before format.
      - id: ruff-check
        args: [--fix]
        files: ^apps/api/(src|tests)/
      - id: ruff-format
        files: ^apps/api/(src|tests)/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Local hook so pyright runs against the project's uv venv (sees deps + types).
  - repo: local
    hooks:
      - id: pyright
        name: pyright (apps/api)
        entry: bash -c 'cd apps/api && uv run pyright src tests'
        language: system
        pass_filenames: false
        files: ^apps/api/(src|tests)/.+\.py$

      # Tach: declarative dependency contract for the cora package.
      # Runs against the project's uv venv so it sees the same source
      # tree as pytest. Configuration lives at apps/api/tach.toml.
      - id: tach-check
        name: tach check (apps/api)
        entry: bash -c 'cd apps/api && uv run tach check'
        language: system
        pass_filenames: false
        files: ^apps/api/(src/cora/.+\.py|tach\.toml)$

      # Architecture fitness functions: AST + filesystem checks that
      # tach can't express (slice file contract, decider purity,
      # routes/wire completeness). Fast, run on every Python change.
      - id: arch-tests
        name: architecture fitness functions (apps/api)
        entry: bash -c 'cd apps/api && uv run pytest tests/architecture -q'
        language: system
        pass_filenames: false
        files: ^apps/api/(src/cora/.+\.py|tests/architecture/.+\.py)$

      # ----------------------------------------------------------------
      # Pre-push only: full-tree ruff check + format (matches CI exactly).
      #
      # The ruff-pre-commit hooks above run against STAGED files only,
      # so unstaged drift can sneak past pre-commit and trip CI on push.
      # This hook runs ruff against the entire src/tests tree at push
      # time so the same violations CI would catch are caught locally
      # one round-trip earlier.
      #
      # Install with: pre-commit install --hook-type pre-push
      # (one-shot per clone; idempotent if already installed).
      #
      # Fast (~1s); pyright + tach + arch-tests run on pre-commit so
      # they stay there to keep pre-push lean.
      # ----------------------------------------------------------------
      - id: ruff-check-all
        name: ruff check (full tree, matches CI)
        entry: bash -c 'cd apps/api && uv run ruff check src tests'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
      - id: ruff-format-check-all
        name: ruff format --check (full tree, matches CI)
        entry: bash -c 'cd apps/api && uv run ruff format --check src tests'
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
