repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Order matters: check (with --fix) before format.
      - id: ruff-check
        args: [--fix]
        files: ^apps/api/(src|tests)/
      - id: ruff-format
        files: ^apps/api/(src|tests)/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Local hook so pyright runs against the project's uv venv (sees deps + types).
  - repo: local
    hooks:
      - id: pyright
        name: pyright (apps/api)
        entry: bash -c 'cd apps/api && uv run pyright src tests'
        language: system
        pass_filenames: false
        files: ^apps/api/(src|tests)/.+\.py$
