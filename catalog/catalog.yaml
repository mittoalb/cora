# CORA Catalog descriptor: the cross-facility vocabulary
#
# The single human-readable source for the kinds shared across every CORA
# deployment. The docs build renders the Catalog pages from this file.
#
# Source-of-truth boundary (see the docs-rewrite plan):
#   - roles MIRROR the code's SEED_ROLES; a drift-guard test asserts equality,
#     so this list cannot silently fall out of step with the code.
#   - the closed affordance / executor-shape vocabularies are validated against
#     code-mirrored frozensets in scripts/catalog_descriptor.py (enum-equality
#     tested), never re-authored here.
#   - families, capabilities, methods, models have no global code seed; this
#     file is their consolidated source, guarded by the round-trip test.
#
# Families ship with no affordances on purpose: an affordance is a Role concern
# (required_affordances live on the roles below), and a Family declares which
# Roles it presents_as. Per-device settings and vendor bindings live on the
# beamline page, not here.

roles:
  - name: Imager
    docstring: "Acquires 2D image frames on exposure or trigger. Satisfying Assets or composed Assemblies emit Image / Frame signals. Direct-detection Cameras and composed scintillator-relay Assemblies both satisfy this Role; the multi-Family disjunction (Lock 17) accepts either path."
    required_affordances: [Imageable]
    optional_affordances: [Binnable, Coolable, Triggerable, Streamable]
    produces: [Image, Frame]
    consumes: [TriggerIn]
  - name: Positioner
    docstring: "Drives at least one degree of freedom to operator-commanded positions. Satisfying Families include LinearStage, RotaryStage, Hexapod, and indexable mechanisms. Single-axis and multi-axis Assets both satisfy; the contract is positioning capability, not axis count."
    required_affordances: [Homeable, Limitable]
    optional_affordances: [Rotatable, Translatable, Posable, Indexable, Capturable, Leading, Following]
    produces: [EncoderPosition]
    consumes: [PositionCommand]
  - name: Controller
    docstring: "Generates or routes signals (motion, timing) that govern subordinate Assets. Satisfying Families are the empty-Affordances <Domain>Controller leaves (MotionController, TimingController). The Controller does NOT itself perform motion / imaging; subordinate Assets do, under its supervision."
    required_affordances: [Identifiable]
    optional_affordances: [Reportable, Pulsing]
    produces: [ControlOut]
    consumes: [ControlIn]
  - name: Detector
    docstring: "Reports a continuous or discrete measurement on query or trigger. Satisfying Families include ion chambers, photodiodes, thermocouples, and other point-sensor anatomies. Distinct from Imager: a Detector produces a scalar or short-vector Reading, not a 2D frame."
    required_affordances: [Reportable]
    optional_affordances: [Triggerable, Streamable]
    produces: [Reading]
    consumes: [TriggerIn]

families:
  # Defined families today. Affordances intentionally empty (a Role concern).
  - name: RotaryStage
  - name: LinearStage
  - name: Camera
  - name: Scintillator
  - name: Shutter
  - name: Hexapod
  - name: MotionController
  - name: Objective
    note: "Per-lens identity inside the MCTOptics Assembly."
  - name: PseudoAxis
    note: "Virtual-axis Family; the MCTOptics_lens_select Asset carries a LookupTable partition rule decomposing a lens index to turret rotation."
  - name: Imager
    note: "Presenter Family for detector Assemblies; the 2-BM Optique Peter detector materializes as the MCTOptics Assembly + Fixture."
  - name: ProbeGeneric
    note: "APS facility-scope template, an abstract detector probe-chain."
  # Pending in code (documented, not yet defined): Goniometer, Monochromator,
  # Slit, Mirror, TimingController; future: OpticalRelay.

capabilities:
  - code: cora.capability.tomography
    name: Tomography
    description: "The canonical synchrotron-CT science technique (NeXus NXtomo analogue)."
    executor_shapes: [Method]
  - code: cora.capability.acquisition
    name: Acquisition
    description: "The bare frame-stack capture primitive (NeXus NXscan analogue), beneath the specific tomography technique."
    executor_shapes: [Method]
  - code: cora.capability.alignment
    name: Alignment
    description: "Iterative tuning toward a target metric; each Method is a step in the rotation-axis alignment chain."
    executor_shapes: [Method]
  - code: cora.capability.calibration
    name: Calibration
    description: "Empirical measurement of system constants; alignment consumes what calibration measures."
    executor_shapes: [Method]
  - code: cora.capability.maintenance
    name: Maintenance
    description: "One-shot setup, recovery, and ceremony operations with no scientific Dataset output."
    executor_shapes: [Method, Procedure]
  # Pending in code: cora.capability.energy_scan, cora.capability.steering.

methods:
  - name: motor_homing
    capability: cora.capability.maintenance
    purpose: "Reference-position seek for motorized Devices; leaves encoders zeroed for absolute moves."
    needed_families: [RotaryStage, LinearStage]
  - name: resolution_alignment
    capability: cora.capability.alignment
    purpose: "The resolution step, an iterative focus-Z peak search on a mounted resolution target."
    needed_families: [LinearStage, Camera, Scintillator]
  - name: focus_alignment
    capability: cora.capability.alignment
    purpose: "The focus step, an iterative Sample-Z peak search for depth-of-focus."
    needed_families: [LinearStage, Camera, Scintillator]
  - name: center_alignment
    capability: cora.capability.alignment
    purpose: "The center step, iterative 0/180 convergence on the rotation-axis pixel position."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: roll_alignment
    capability: cora.capability.alignment
    purpose: "The roll step, iterative 0/180 Y-delta correction so the rotation axis is perpendicular to the camera Y axis."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: pitch_alignment
    capability: cora.capability.alignment
    purpose: "The pitch step, iterative 0/180 sharpness-delta correction so the rotation axis is perpendicular to the beam."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: first_light
    capability: cora.capability.acquisition
    purpose: "Commissioning milestone, a dark plus first-light plus safe-state frame ceremony confirming beam reaches the detector."
    needed_families: [Shutter, Camera, Scintillator]
  - name: dark_baseline
    capability: cora.capability.acquisition
    purpose: "Dark-frame stack plus pixel-wise baseline, producing a Dataset for reconstruction subtraction."
    needed_families: [Shutter, Camera, Scintillator]
  - name: flat_baseline
    capability: cora.capability.acquisition
    purpose: "Flat-field stack (shutter open, no sample) plus pixel-wise baseline, producing a Dataset for reconstruction division."
    needed_families: [Shutter, Camera, Scintillator]
  - name: hexapod_reboot
    capability: cora.capability.maintenance
    purpose: "Recovery for a stuck hexapod controller: IOC stop, PDU power-cycle, IOC start, enable check."
    needed_families: [Hexapod]
  - name: tomography
    capability: cora.capability.tomography
    purpose: "The canonical imaging routine; a Run producing an H5 projection-stack Dataset from operator exposure, projections, and angle-range."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: alignment_calibration
    capability: cora.capability.calibration
    purpose: "Pre-step measuring motor-sensitivity constants empirically (bump an axis by a known delta, observe centroid shift, K = shift/bump)."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: streaming_tomography
    capability: cora.capability.tomography
    purpose: "Live-reconstruction tomography supporting mid-flight adjust_run steering on observed reco quality."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: continuous_rotation_tomography
    capability: cora.capability.tomography
    purpose: "N back-to-back rotation Runs sharing one Plan and Subject under a Campaign(intent=Series)."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: mosaic_tomography
    capability: cora.capability.tomography
    purpose: "Tiled lateral-translation tomography for samples larger than the field of view, stitched in post."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]

