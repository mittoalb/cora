# CORA Catalog descriptor: the cross-facility vocabulary
#
# The single human-readable source for the kinds shared across every CORA
# deployment. The docs build renders the Catalog pages from this file.
#
# Source-of-truth boundary (see the docs-rewrite plan):
#   - roles MIRROR the code's SEED_ROLES; a drift-guard test asserts equality,
#     so this list cannot silently fall out of step with the code.
#   - the closed affordance / executor-shape vocabularies are validated against
#     code-mirrored frozensets in scripts/catalog_descriptor.py (enum-equality
#     tested), never re-authored here.
#   - families, capabilities, methods, models have no global code seed; this
#     file is their consolidated source, guarded by the round-trip test.
#
# Families ship with no affordances on purpose: an affordance is a Role concern
# (required_affordances live on the roles below), and a Family declares which
# Roles it presents_as. Per-device settings and vendor bindings live on the
# beamline page, not here.

roles:
  - name: Detector
    docstring: "Acquires 2D image frames on exposure or trigger. Satisfying Assets or composed Assemblies emit Image / Frame signals. Direct-detection Cameras and composed scintillator-relay Assemblies both satisfy this Role; the multi-Family disjunction accepts either path."
    required_affordances: [Imageable]
    optional_affordances: [Binnable, Coolable, Triggerable, Streamable]
    produces: [Image, Frame]
    consumes: [TriggerIn]
  - name: Positioner
    docstring: "Drives at least one degree of freedom to operator-commanded positions. Satisfying Families include LinearStage, RotaryStage, Hexapod, and indexable mechanisms. Single-axis and multi-axis Assets both satisfy; the contract is positioning capability, not axis count."
    required_affordances: [Homeable, Limitable]
    optional_affordances: [Rotatable, Translatable, Posable, Indexable, Capturable, Leading, Following]
    produces: [EncoderPosition]
    consumes: [PositionCommand]
  - name: Controller
    docstring: "Generates or routes signals (motion, timing) that govern subordinate Assets. Satisfying Families are the empty-Affordances <Domain>Controller leaves (MotionController, TimingController). The Controller does NOT itself perform motion / imaging; subordinate Assets do, under its supervision."
    required_affordances: [Identifiable]
    optional_affordances: [Reportable, Pulsing]
    produces: [ControlOut]
    consumes: [ControlIn]
  - name: Sensor
    docstring: "Reports a continuous or discrete measurement on query or trigger. Satisfying Families include ion chambers, photodiodes, thermocouples, and other point-sensor anatomies. Distinct from Detector: a Sensor produces a scalar or short-vector Reading, not a 2D frame."
    required_affordances: [Reportable]
    optional_affordances: [Triggerable, Streamable]
    produces: [Reading]
    consumes: [TriggerIn]
  - name: Regulator
    docstring: "Drives a continuous process variable to an operator-commanded setpoint via a control loop. Satisfying Families include TemperatureController (and, once earned, flow / pressure regulators). Distinct from Controller, which supervises subordinate Assets without itself performing, and from Sensor, which only reports: a Regulator performs by acting on the process variable."
    required_affordances: [Settable]
    optional_affordances: [PIDControllable, Coolable, Reportable]
    produces: [Reading]
    consumes: [Setpoint]

families:
  # Defined families today. Affordances intentionally empty (a Role concern).
  - name: RotaryStage
  - name: LinearStage
  - name: TiltStage
    note: "Limited-range rotational tilt-stage Family (a goniometer). Distinct from RotaryStage (it carries no PSO Following/Marking for fly-scans) and from LinearStage (the motion is rotational, not translation). 2-BM: the LaminographyPitch Kohzu goniometer, modelled in the SampleTower Assembly."
  - name: Camera
  - name: Scintillator
  - name: EnergyDispersiveSpectrometer
    note: "Energy-dispersive X-ray detector Family: resolves photon energy per event to give a spectrum, from which element maps or absorption edges are fit downstream. Presents_as Sensor (it produces a scalar or short-vector Reading per point, not a 2D Frame, so it is distinct from Camera and the Detector Role). One Family spans the silicon-drift and germanium variants; channel count and vendor are per-Asset settings. 2-ID: the 2-ID-D fluorescence detector (XRF mapping). 7-BM: the germanium energy-dispersive-diffraction detector. Earned in once two deployments shared it; the name deliberately avoids the reserved Detector Role noun (a detector is a Role an Asset plays, not its Family)."
  - name: Shutter
  - name: Hexapod
  - name: MotionController
  - name: TimingController
    note: "Hardware timing-signal generation and distribution (triggers, gates, sync pulses); presents_as Controller, which carries Pulsing. Anchored at 2-BM by Timing (the softGlueZynq Zynq FPGA box). Substrate (softGlue, FPGA, Zynq) stays out of the name and lives in settings or the bound Model."
  - name: Objective
    note: "Per-lens identity inside the Microscope Assembly."
  - name: PseudoAxis
    note: "Virtual-axis Family; the Objective_Selector Asset carries a LookupTable partition rule decomposing an objective index to turret rotation."
  - name: Housing
    note: "Containment chassis Family; the Housing Asset parents the Microscope constituents and carries the Mount."
  - name: GenericProbe
    note: "APS facility-scope template, an abstract detector probe-chain."
  - name: Table
    note: "Support/positioning table Family (the hutch optical tables). One Family spans the 4-DOF sample table (pure translation), the 6-DOF detector table (six virtual axes on record 2bmb:table3), and the mirror table (in operational use, its X axes driven by the energy-change IOC for stripe selection, STAGE-7); the axis set is a per-Asset settings difference, not a Family split. 'Optical' is deliberately not in the name (it would name the contents, not the table's own nature; the OpticalHousing -> Housing precedent). Instances qualify at the Asset layer: SampleTable / DetectorTable / MirrorTable."
  - name: Slit
    note: "Beam-defining four-blade slit Family (four independently-driven blades forming a variable horizontal/vertical opening). 2-BM: ConditioningSlit (A-station L3-20) and SampleSlit (B-station)."
  - name: Aperture
    note: "Patterned beam-shaping aperture Family: a fixed-pattern mask positioned in the beam as a unit. Distinct from Slit (a variable opening defined by four driven blades) and from a passive Mask (a fixed beam-defining opening that does not move); the discriminator is the element's nature (a fixed code pattern), not that it is driven. 2-BM: the coded aperture for compressive-sensing tomography, fine-positioned by ApertureFineDrive."
  - name: Mask
    note: "Passive beam-defining mask Family: a plain fixed-opening element that shapes or limits the beam, positioned as a unit. Distinct from Slit (a variable opening via four driven blades) and Aperture (a fixed code pattern); the discriminator is the element's nature (a plain fixed opening). One Family spans the permanently-fixed masks and the movable safety-mask variant (movability is a per-Asset setting, the Table / InsertionDevice precedent). 2-BM: the M3-24 front-end exit mask. TomoWISE: the FM1 / FM2 fixed masks and the MSM movable safety mask. Earned in once two deployments shared it; beam-effect modelling stays deferred (the passive beam-path tier)."
  - name: Window
    note: "Passive beam-transmitting window Family: a fixed element that passes the beam while isolating the vacuum envelope. Distinct from Mask / Aperture / Slit (which define or shape an opening) and from BeamStop / Collimator (which absorb beam): a Window transmits. One Family spans the beryllium front-end windows and the downstream Kapton window; per-window identity is at the Asset layer (the Table precedent). 2-BM: the three OFHC-housed front-end Be windows (registered as FrontEndWindow child Assets) and the DetectorWindow. 32-ID: the FrontEndWindow. 19-BM: the FEExitWindow, DEntryWindow, and KaptonWindow. Earned in once three deployments shared it; beam-effect (transmission-vs-energy) modelling stays deferred (the passive beam-path tier)."
  - name: BeamStop
    note: "Passive beam-absorbing stop Family: a fixed element that absorbs the transmitted or direct beam for personnel safety or detector protection. Distinct from Collimator (which trims the beam envelope rather than stopping it), from Mask / Aperture (which define an opening), and from a Window (which transmits). One Family spans the white-beam, monochromatic-beam, photon, and bremsstrahlung stops; the stopped beam-mode is a per-Asset setting (the Table / InsertionDevice precedent). 2-BM: the SafetyStack BeamStop. 32-ID: WhiteBeamStop and MonochromaticBeamStop. 19-BM: PhotonStop and BremsstrahlungStop. Earned in once three deployments shared it; beam-effect modelling stays deferred (the passive beam-path tier)."
  - name: Collimator
    note: "Passive beam-collimating Family: a fixed element that limits the transmitted fan to the beamline acceptance and absorbs the bremsstrahlung halo. Distinct from BeamStop (which absorbs the full beam rather than trimming it), from Slit (a variable driven opening), and from Mask / Aperture (which define the beam-shaping opening). 2-BM: the SafetyStack Collimator. 19-BM: the UpstreamCollimator and DownstreamCollimator (lead). Earned in once two deployments shared it; beam-effect modelling stays deferred (the passive beam-path tier)."
  - name: Mirror
    note: "Beam-steering grazing-incidence mirror optic Family. 2-BM: the Y3-30 mirror (distinct from its MirrorTable support, which is Family Table)."
  - name: Monochromator
    note: "Energy-selecting optic Family; at 2-BM the double-multilayer monochromator (DMM). The energy-change IOC drives its Bragg arms + M2 vertical offset per energy; inserting it picks the beam energy, pink-beam operation bypasses it."
  - name: Condenser
    note: "Beam-condensing optic Family for full-field transmission X-ray microscopy: shapes the monochromatic beam onto the sample (a capillary or a condenser zone plate). Distinct from the ZonePlate (the imaging objective downstream of the sample) and from a Mirror (grazing-incidence steering); the discriminator is its role, conditioning the illumination onto the sample. 32-ID: the Condenser (capillary or condenser zone plate, type unconfirmed). FXI: the clens condenser. Earned in once two deployments shared it; per-Asset optical parameters live at the Asset layer."
  - name: ZonePlate
    note: "Diffractive Fresnel zone-plate objective Family for full-field transmission X-ray microscopy: magnifies the transmitted image onto the detector, set by its diameter and outermost-zone width. Distinct from the Condenser (which conditions the illumination onto the sample) and from a refractive Objective (the visible-light objective in a scintillator-relay detector); the ZonePlate is the X-ray imaging objective. 32-ID: the ZonePlate. FXI: the zp zone plate (NanoTools, about 244 um diameter, about 30 nm outermost zone, carried confirm). Earned in once two deployments shared it; per-Asset zone parameters live at the Asset layer."
  - name: PhaseRing
    note: "Zernike phase-ring optic Family for full-field transmission X-ray microscopy: a phase plate in the back focal plane that renders phase contrast as amplitude contrast, inserted or retracted per imaging mode. Distinct from the ZonePlate (the imaging objective) and the Condenser (the illumination optic); the discriminator is its phase-contrast role. 32-ID: the PhaseRing. FXI: the phase_ring. Earned in once two deployments shared it; the inserted/retracted state is a per-Asset setting."
  - name: Filter
    note: "Discrete absorber-foil changer Family; at 2-BM the C / Al foil paddles that attenuate and condition the white beam (the upstream paddle 2bma:m17 is the operational selector; the downstream 2bma:m18 is currently Faulted)."
  - name: InsertionDevice
    note: "Source-defining insertion-device Family (the storage-ring straight-section source). One Family spans the cryo-undulator and the wiggler; the device type and its gap / field parameters are a per-Asset settings difference, not a Family split (the Table precedent). TomoWISE: the CPMU14 cryogenic permanent-magnet undulator and the 3T3PW three-pole wiggler, switchable per operation mode. A bending-magnet source (2-BM) is not an insertion device; it stays modelled loosely as the beam source, not through this Family."
  - name: Goniometer
    note: "Multi-axis sample-orientation goniometer Family: omega / chi / phi rotation plus the x / y / z sample-centring translations, with centre-of-rotation control. The MX micro-goniometer. Distinct from RotaryStage (a single tomographic rotation axis that carries PSO fly-scan Following / Marking, which the goniometer does not) and from TiltStage (a limited-range tilt with no primary rotation axis); the discriminator is the multi-axis crystal-orientation role. Graduated from pending on i03 (the Smargon), CORA's first canonical-goniometer deployment; chi-vs-kappa and axis-count are a per-Asset settings or bound-Model difference, not a Family split (the InsertionDevice / Table precedent). The composed multi-stage scattering diffractometer (4-ID / 8-ID, the Diffractometer Assembly) binds one Goniometer Asset for its sample-orientation circles."
  - name: TemperatureController
    note: "Continuous-setpoint sample-environment temperature actuator Family: drives a sample temperature to a commanded setpoint, typically via a PID control loop. Presents the Regulator Role (requires the Settable affordance). Distinct from Controller (which supervises subordinate Assets without itself performing) and Sensor (which only reports): a TemperatureController performs by acting on the temperature. Graduated on the rule-of-three across Diamond i22 (Linkam), i03 (cryostream, thawer), and i11 (Cyberstar / Eurotherm blowers, Oxford cryostreams); cooling-vs-heating and PID-vs-other are a per-Asset settings or bound-Model difference, not a Family split. FlowController (a settable-setpoint mass-flow / pump actuator that would also present Regulator) stays loose pending its own rule-of-three."
  # Pending in code (documented, not yet defined): none.
  # future: OpticalRelay.

capabilities:
  - code: cora.capability.tomography
    name: Tomography
    description: "The canonical synchrotron-CT science technique (NeXus NXtomo analogue)."
    executor_shapes: [Method]
  - code: cora.capability.acquisition
    name: Acquisition
    description: "The bare frame-stack capture primitive (NeXus NXscan analogue), beneath the specific tomography technique."
    executor_shapes: [Method, Procedure]
  - code: cora.capability.alignment
    name: Alignment
    description: "Iterative tuning toward a target metric; each Method is a step in the rotation-axis alignment chain."
    executor_shapes: [Method]
  - code: cora.capability.characterization
    name: Characterization
    description: "Empirical measurement of system constants; alignment consumes what characterization measures."
    executor_shapes: [Method]
  - code: cora.capability.maintenance
    name: Maintenance
    description: "One-shot setup, recovery, and ceremony operations with no scientific Dataset output."
    executor_shapes: [Method, Procedure]
  - code: cora.capability.energy_change
    name: Energy Change
    description: "Set the beam energy as one coordinated move of the energy-driven optic axes (the DMM Bragg arms + M2 offset, and the beam-tracking sample-slit vertical pair) to their per-energy positions. Takes a free energy value (keV) that interpolates the per-axis energy curves; distinct from a future energy_scan sweep. Realized as a Method (the parameterized recipe) and executed as a Procedure (the coordinated move)."
    executor_shapes: [Method, Procedure]
  # Pending in code: cora.capability.energy_scan, cora.capability.steering.

methods:
  - name: motor_homing
    capability: cora.capability.maintenance
    purpose: "Reference-position seek for motorized Devices; leaves encoders zeroed for absolute moves."
    needed_families: [RotaryStage, LinearStage]
  - name: resolution_alignment
    capability: cora.capability.alignment
    purpose: "The resolution step, an iterative propagation-distance peak search on a mounted resolution target."
    needed_families: [LinearStage, Camera, Scintillator]
  - name: focus_alignment
    capability: cora.capability.alignment
    purpose: "The focus step, an iterative Sample-Z peak search for depth-of-focus."
    needed_families: [LinearStage, Camera, Scintillator]
  - name: center_alignment
    capability: cora.capability.alignment
    purpose: "The center step, iterative 0/180 convergence on the rotation-axis pixel position."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: roll_alignment
    capability: cora.capability.alignment
    purpose: "The roll step, iterative 0/180 Y-delta correction so the rotation axis is perpendicular to the camera Y axis."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: pitch_alignment
    capability: cora.capability.alignment
    purpose: "The pitch step, iterative 0/180 sharpness-delta correction so the rotation axis is perpendicular to the beam."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: dark_field
    capability: cora.capability.acquisition
    purpose: "Dark-frame stack plus pixel-wise baseline, producing a Dataset for reconstruction subtraction."
    needed_families: [Shutter, Camera, Scintillator]
  - name: flat_field
    capability: cora.capability.acquisition
    purpose: "Flat-field stack (shutter open, no sample) plus pixel-wise baseline, producing a Dataset for reconstruction division."
    needed_families: [Shutter, Camera, Scintillator]
  - name: hexapod_reboot
    capability: cora.capability.maintenance
    purpose: "Recovery for a stuck hexapod controller: IOC stop, PDU power-cycle, IOC start, enable check."
    needed_families: [Hexapod]
  - name: tomography
    capability: cora.capability.tomography
    purpose: "The canonical imaging routine; a Run producing an H5 projection-stack Dataset from operator exposure, projections, and angle-range."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: sensitivity_characterization
    capability: cora.capability.characterization
    purpose: "Pre-step measuring motor-sensitivity constants empirically (bump an axis by a known delta, observe centroid shift, K = shift/bump)."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: energy_characterization
    capability: cora.capability.characterization
    purpose: "Energy calibration via a channel-cut crystal: rock a crystal of known 2d through its Bragg peak, fit the peak angle, recover the true beam energy, and re-save the corrected per-energy curve as a new revision (ENERGY-7)."
    needed_families: [Monochromator, RotaryStage]
  - name: streaming_tomography
    capability: cora.capability.tomography
    purpose: "Live-reconstruction tomography supporting mid-flight adjust_run steering on observed reco quality."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: continuous_rotation_tomography
    capability: cora.capability.tomography
    purpose: "N back-to-back rotation Runs sharing one Plan and Subject under a Campaign(intent=Series)."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: mosaic_tomography
    capability: cora.capability.tomography
    purpose: "Tiled lateral-translation tomography for samples larger than the field of view, stitched in post."
    needed_families: [RotaryStage, LinearStage, Camera, Scintillator]
  - name: beamline_energy_change
    capability: cora.capability.energy_change
    purpose: "Set the beam energy by driving the energy-tracking optic axes (the DMM Bragg arms + M2 offset, and the sample-slit vertical pair) to their per-energy positions as one coordinated move."
    needed_families: [Monochromator, Slit, PseudoAxis]

