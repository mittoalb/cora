# Recipes are deliberately not a catalog kind: a Recipe (Recipe BC) is the
# deployment-bound executable step sequence that hardcodes a beamline's device
# addresses, so it is per-deployment, not cross-facility vocabulary. The
# portable rung is the Method. Authored Recipes, if any, belong in the
# deployment docs, not here.

# Assemblies: reusable composition blueprints. The spine computes each
# Assembly's id (uuid5 over name) and content_hash; sub-assembly links reference
# the child by name. A beamline materializes these as Fixtures (slot -> Asset),
# which live in the deployment descriptor, not here.
assemblies:
  - name: Optics
    note: >-
      Reusable optics core: turret, objectives, virtual objective selector, and an
      optional propagation-distance stage. Presents nothing on its own; composed by
      detector Assemblies. propagation_distance is ZeroOrOne because some deployments
      drive propagation with a shared facility stage rather than a per-Optics rail
      (2-BM binds a per-microscope PropagationDistance; TomoWISE shares one detector
      gantry rail across both microscopes, so its microscopes leave the slot empty).
    presents_as: []
    required_slots:
      - { slot_name: turret, required_families: [LinearStage], cardinality: Exactly1 }
      - { slot_name: objectives, required_families: [Objective], cardinality: OneOrMore }
      - { slot_name: objective_selector, required_families: [PseudoAxis], cardinality: Exactly1 }
      - { slot_name: propagation_distance, required_families: [LinearStage], cardinality: ZeroOrOne }
  - name: Microscope
    note: >-
      Full scintillator-relay detector: the Optics sub-assembly plus an optional camera
      and a scintillator leaf slot. Presents the Detector Role. Zero required_wires in v1.
      camera is ZeroOrOne because a microscope can be camera-agnostic, drawing from a
      shared camera pool (2-BM binds its camera per microscope; TomoWISE's two microscopes
      share four interchangeable cameras on one gantry, so each leaves the slot empty).
    presents_as: [Detector]
    required_slots:
      - { slot_name: camera, required_families: [Camera], cardinality: ZeroOrOne }
      - { slot_name: scintillator, required_families: [Scintillator], cardinality: Exactly1 }
    required_sub_assemblies:
      - { slot_name: optics, sub_assembly: Optics }
  - name: Diffractometer
    note: >-
      Composed multi-circle scattering diffractometer, presenting the Positioner Role. It
      COMPOSES a Goniometer (the sample-orientation circles plus x/y/z centring, one Asset),
      zero or more RotaryStage detector-arm circles, and a reciprocal-space PseudoAxis whose
      partition rule resolves the hklpy2 inverse kinematics. This is the distinction from the
      Goniometer Family: the Goniometer is the integrated single-device sample orienter (the
      I03 Smargon); the Diffractometer is the larger composed scattering instrument that USES
      a Goniometer and adds the detector arm and reciprocal-space layer. detector_arm is
      ZeroOrMore because the count is a per-deployment geometry: 8-ID's six-circle Huber binds
      four sample circles as the Goniometer and nu / delta as the detector arm, while a
      Eulerian cradle may have none. Flat (no sub-assembly), unlike Microscope. Earned in once
      two independent beamlines (4-ID, 8-ID) shared it.
    presents_as: [Positioner]
    required_slots:
      - { slot_name: goniometer, required_families: [Goniometer], cardinality: Exactly1 }
      - { slot_name: detector_arm, required_families: [RotaryStage], cardinality: ZeroOrMore }
      - { slot_name: reciprocal_space, required_families: [PseudoAxis], cardinality: Exactly1 }
