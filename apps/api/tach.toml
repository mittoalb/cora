# Tach: declarative dependency contract for the cora package.
#
# Enforces:
#   1. Layered: shared depends on nothing; infrastructure depends only
#      on shared; BCs depend on shared + infrastructure (+ any sibling
#      aggregate kernels they integrate with); api depends on every BC.
#      `cora.shared` is the pure-value-object foundation (Identifier
#      VOs, NewType identity aliases, bounded-text validators, JSON
#      Schema helpers); `cora.infrastructure` is composition root,
#      adapters, ports, and event-sourcing machinery.
#   2. Cross-BC: a BC may only reach into a sibling BC through that
#      sibling's `aggregates.*` namespace (the read-side public
#      surface). Never through `features.*` (sibling slice handlers).
#   3. Aggregate kernels are leaf modules with their own dependency
#      whitelist, so cross-BC deps target `cora.X.aggregates`
#      specifically and `cora.X.features` is implicitly forbidden
#      to outsiders.
#
# Cross-slice independence inside a BC and slice file contracts are
# enforced by `tests/architecture/` (AST-based) rather than tach,
# because per-slice module declarations would balloon this file.
#
# Run: `uv run tach check` (also wired into pre-commit and CI).
# Visualize: `uv run tach show` opens the dependency graph.

exclude = ["tests", "**/__pycache__", ".venv", "build", "dist"]
source_roots = ["src"]

# Shared kernel: pure value objects and helpers with zero `cora.*`
# imports. Adapter-free and side-effect-free. Importable from every
# BC and from `cora.infrastructure`. Modules that depend on ports,
# the kernel, or adapters belong in `cora.infrastructure`, not here.
[[modules]]
path = "cora.shared"
depends_on = []

# Infrastructure: composition root, adapters, ports, event-sourcing
# machinery, and cross-cutting concerns. May reach down into
# `cora.shared` (e.g. `signing.py` uses `content_hash`).
#
# The Kernel data class lives in `cora.infrastructure.kernel` (zero
# BC imports) and the authorize factory is injected into `build_kernel`
# via the composition root (`cora.api.main` -> `cora.trust.build_authorize.
# build_authorize`).
[[modules]]
path = "cora.infrastructure"
depends_on = ["cora.shared"]

# Aggregate kernels: declared as their own modules so other BCs
# can target them with `depends_on = ["cora.X.aggregates"]` while
# `cora.X.features` stays implicitly off-limits to outsiders.
[[modules]]
path = "cora.access.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.agent.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.campaign.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.caution.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.calibration.aggregates"
depends_on = ["cora.infrastructure", "cora.shared", "cora.calibration.quantities"]

[[modules]]
# Closed catalog of CalibrationQuantity values + per-quantity JSON Schemas.
# A foundational leaf that both the aggregates (load_pinned_curve curve
# extraction) and the features (define / append deciders validate values
# against the schemas) build on, so it is its own module rather than
# parent-BC code the aggregates may not reach up into.
path = "cora.calibration.quantities"
depends_on = []

[[modules]]
path = "cora.data.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.decision.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.enclosure.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.enclosure.adapters"
depends_on = ["cora.infrastructure", "cora.shared", "cora.enclosure.aggregates"]

[[modules]]
path = "cora.equipment.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.equipment.ports"
depends_on = ["cora.infrastructure", "cora.shared", "cora.equipment.aggregates"]

[[modules]]
path = "cora.equipment.adapters"
depends_on = ["cora.infrastructure", "cora.shared", "cora.equipment.aggregates", "cora.equipment.ports"]

[[modules]]
path = "cora.federation.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.operation.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.recipe.aggregates"
depends_on = ["cora.infrastructure", "cora.shared", "cora.equipment.aggregates"]

[[modules]]
path = "cora.run.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.safety.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.subject.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.supply.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

[[modules]]
path = "cora.trust.aggregates"
depends_on = ["cora.infrastructure", "cora.shared"]

# Bounded contexts. Each BC depends on its own aggregate kernel,
# infrastructure, and any sibling aggregate kernels it integrates
# with at handler-load time (cross-aggregate validation pattern).
[[modules]]
path = "cora.access"
depends_on = ["cora.infrastructure", "cora.shared", "cora.access.aggregates"]

# Data BC depends on its own aggregates plus Run + Subject aggregate
# kernels for cross-aggregate validation at register_dataset time
# (DatasetRegistrationContext pre-loads producing_run + linked
# subject + each derived_from Dataset).
[[modules]]
path = "cora.data"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.data.aggregates",
    "cora.run.aggregates",
    "cora.subject.aggregates",
    # register_dataset loads the producing Procedure (Operation BC) to
    # derive the actuation-kind provenance server-side (ActuationKind gate).
    "cora.operation.aggregates",
]

# Decision BC depends on its own aggregates plus Access aggregate
# kernel for actor existence-check at register_decision time
# (DecisionRegistrationContext pre-loads the Actor + optional
# parent Decision).
[[modules]]
path = "cora.decision"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.decision.aggregates",
    "cora.access.aggregates",
]

[[modules]]
path = "cora.equipment"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.equipment.aggregates",
    "cora.equipment.ports",
    "cora.equipment.adapters",
]

[[modules]]
path = "cora.subject"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.subject.aggregates",
    "cora.equipment.aggregates",
]

[[modules]]
path = "cora.supply"
depends_on = ["cora.infrastructure", "cora.shared", "cora.supply.aggregates"]

# Enclosure BC owns the Enclosure aggregate (operator-declared physical
# zone with permit observation + lifecycle FSM Active -> Decommissioned).
# Sub-Slice A scaffolds the aggregate only; no cross-BC kernel loads on
# the write path yet (Asset existence check for `containing_asset_id`
# deferred per the Stage-1 Sub-Slice A open ambiguity on Asset binding).
[[modules]]
path = "cora.enclosure"
depends_on = ["cora.infrastructure", "cora.shared", "cora.enclosure.aggregates", "cora.enclosure.adapters"]

[[modules]]
path = "cora.trust"
depends_on = ["cora.infrastructure", "cora.shared", "cora.trust.aggregates"]

[[modules]]
path = "cora.recipe"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.recipe.aggregates",
    "cora.equipment.aggregates",
]

[[modules]]
path = "cora.run"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.run.aggregates",
    "cora.campaign.aggregates",
    "cora.equipment.aggregates",
    "cora.recipe.aggregates",
    "cora.subject.aggregates",
]

# Operation BC depends on its own aggregates plus Equipment aggregate
# kernel for asset existence + lifecycle check at start_procedure time
# (start_procedure context pre-loads the Asset before the pure decider).
# `cora.recipe.aggregates` provides `load_capability` + `Capability` +
# `ExecutorShape` + `CapabilityNotFoundError`: the register_procedure
# handler conditionally loads the bound Recipe Capability when
# `command.capability_id` is supplied, and the decider validates that
# `ExecutorShape.PROCEDURE` is in `capability.executor_shapes`. Same
# cross-BC import direction Recipe -> Operation as Capability template
# -> Procedure executor binding (project_capability_aggregate_design).
[[modules]]
path = "cora.operation"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.operation.aggregates",
    "cora.equipment.aggregates",
    "cora.recipe.aggregates",
    # `cora.calibration.aggregates` provides `load_pinned_curve` used by
    # the PseudoAxis runtime evaluator to load a LookupTable rule's pinned
    # calibration curve before interpolating (the rule pins
    # calibration_id + calibration_revision_id; the curve is not inlined).
    "cora.calibration.aggregates",
    # `cora.run.aggregates` provides `load_run` used by
    # `start_procedure` handler to resolve the parent Run's
    # Method.needed_supplies chain for Phase-of-Run pre-flight gate
    # per [[project_supply_preflight_gate_design]]. Standalone
    # Procedures (no parent_run_id) skip the load.
    "cora.run.aggregates",
]

# Safety BC owns the Clearance aggregate (FSM authorising hazardous
# work). No cross-BC kernel imports today: HazardClassification is a
# self-contained discriminated-union VO, and facility_asset_id is a
# bare identifier reference (no Asset load on the write path).
[[modules]]
path = "cora.safety"
depends_on = ["cora.infrastructure", "cora.shared", "cora.safety.aggregates"]

# Caution BC owns the Caution aggregate (operator-authored tribal-
# knowledge notes; 3-state FSM). Day-1 lock: target ids are bare UUID
# references (Asset / Procedure) with NO cross-BC kernel loads on the
# write path (eventual-consistency stance per Trust Conduit refs +
# Asset parent refs + Procedure target Asset refs precedent).
[[modules]]
path = "cora.caution"
depends_on = ["cora.infrastructure", "cora.shared", "cora.caution.aggregates"]

# Calibration BC owns the Calibration aggregate (empirical
# instrument-value records keyed by `(subsystem_or_asset_id, quantity,
# operating_point)` with append-only revision history). Source FK
# targets (Procedure / Dataset / Actor) are bare UUID references on
# the write path (eventual-consistency stance per the adjust_run /
# decided_by_decision_id precedent). The polymorphic
# `CalibrationSource` discriminated union is self-contained on the
# aggregate; no cross-BC kernel imports needed here. Cross-BC
# integration (Run.pinned_calibration_ids, Dataset.used_calibration_ids)
# lives additively on the consumer BCs, not here.
[[modules]]
path = "cora.calibration"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.calibration.aggregates",
    # define / append deciders + list routes validate against and surface
    # the closed CalibrationQuantity catalog + per-quantity schemas.
    "cora.calibration.quantities",
    # publish_revision slice emits a cross-BC event pair
    # (CalibrationRevisionPublished on Calibration; PublicationReceiptRecorded
    # on the matching outbound Permit) atomically via
    # EventStore.append_streams per project_federation_port_design.md
    # cross-BC discipline. The decider imports the federation event class
    # to construct the typed payload.
    "cora.federation.aggregates",
]

# Federation BC owns the Permit (unified, OutboundTerms | InboundTerms
# tagged union) / Credential / Seal aggregates per
# [[project_federation_port_design]] Stage 1 lock. Day-1 lock: bare
# UUID references to peer Facility / Actor targets on the write path
# (eventual-consistency stance per the Calibration / Caution / Trust
# Conduit precedent). The SecretStore port lives in
# cora.infrastructure.ports (used by Credential slices in Stage 2b/2c).
# Depends on `cora.decision.aggregates` because `register_permit` writes
# `DecisionRegistered` on the Decision stream alongside `PermitDefined`
# on the Permit stream in ONE transaction via `EventStore.append_streams`
# (same cross-BC atomic-write pattern as Agent's `define_agent` writing
# `ActorRegistered` on the Access stream).
[[modules]]
path = "cora.federation"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.federation.aggregates",
    "cora.decision.aggregates",
]

# Campaign BC owns the Campaign aggregate (operator-declared
# coordinated container above Run; 5-state FSM
# Planned -> Active <-> Held -> Closed | Abandoned). The cross-
# aggregate membership slices (`add_run_to_campaign` /
# `remove_run_from_campaign`) load the Run aggregate at handler-load
# time and emit `RunAddedToCampaign` / `RunRemovedFromCampaign` to the
# Run stream atomically with `CampaignRunAdded` / `CampaignRunRemoved`
# on the Campaign stream via `EventStore.append_streams`. Same shape
# as Safety's `amend_clearance`.
[[modules]]
path = "cora.campaign"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.campaign.aggregates",
    "cora.run.aggregates",
]

# Agent BC owns the Agent aggregate (config-only AI-agent identity
# record; 3-state FSM Defined -> Versioned -> Deprecated). Depends on
# `cora.access.aggregates` because `define_agent` writes
# `ActorRegistered(kind="agent")` to the Access stream AND
# `AgentDefined` to the Agent stream in ONE transaction (the
# Agent.id == Actor.id identity-sharing invariant; same atomic-write
# pattern as Campaign's `add_run_to_campaign`).
#
# Two further cross-BC aggregate dependencies serve the
# `RunDebrieferSubscriber`:
#   - `cora.run.aggregates` to subscribe to terminal Run events
#     (RunCompleted / RunAborted / RunStopped / RunTruncated) and
#     fold the Run aggregate via `load_run`.
#   - `cora.decision.aggregates` to compose `DecisionRegistered`
#     events with a deterministic decision_id (UUID5-derived from
#     the terminal event_id for at-most-once retry semantics).
# Conventions preserved: imports only from sibling `aggregates.*`,
# never `features.*` (rule 2 in this file's header).
[[modules]]
path = "cora.agent"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.agent.aggregates",
    "cora.access.aggregates",
    "cora.run.aggregates",
    "cora.decision.aggregates",
    # CautionDrafter subscriber:
    #   - `cora.recipe.aggregates` for `load_plan` (subscriber reads
    #     Plan for asset_ids).
    #   - `cora.caution.aggregates` for VOs in the CautionDrafter
    #     prompt schema + the `promote_caution_proposal` handler's
    #     cross-BC write (constructs `CautionRegistered` /
    #     `CautionSuperseded` events directly via
    #     `EventStore.append_streams`, mirroring `define_agent`'s
    #     cross-BC write of `ActorRegistered`). No sibling-features
    #     import: rule 2 stays inviolate.
    "cora.recipe.aggregates",
    "cora.caution.aggregates",
]

# API entrypoint composes every BC.
[[modules]]
path = "cora.api"
depends_on = [
    "cora.infrastructure",
    "cora.shared",
    "cora.access",
    # RunSupervisor runtime gates on Actor.active (operator-revocation) via load_actor.
    "cora.access.aggregates",
    "cora.agent",
    "cora.calibration",
    "cora.campaign",
    "cora.caution",
    "cora.data",
    "cora.decision",
    # RunSupervisor runtime (cora.api._run_supervisor) composes Decision events
    # the same way the agent subscribers do (blessed cross-BC aggregate access).
    "cora.decision.aggregates",
    "cora.enclosure",
    "cora.enclosure.adapters",
    "cora.equipment",
    "cora.equipment.adapters",
    "cora.federation",
    "cora.operation",
    "cora.recipe",
    "cora.run",
    # RunSupervisor runtime catches Run lifecycle errors (RunCannotHoldError /
    # RunNotFoundError) when a Run changes state under it between read and issue.
    "cora.run.aggregates",
    "cora.safety",
    "cora.subject",
    "cora.supply",
    "cora.trust",
]
