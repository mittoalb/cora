# Tach: declarative dependency contract for the cora package.
#
# Enforces:
#   1. Layered: infrastructure depends on nothing; BCs depend on
#      infrastructure; api depends on every BC.
#   2. Cross-BC: a BC may only reach into a sibling BC through that
#      sibling's `aggregates.*` namespace (the read-side public
#      surface). Never through `features.*` (sibling slice handlers).
#   3. Aggregate kernels are leaf modules with their own dependency
#      whitelist, so cross-BC deps target `cora.X.aggregates`
#      specifically and `cora.X.features` is implicitly forbidden
#      to outsiders.
#
# Cross-slice independence inside a BC and slice file contracts are
# enforced by `tests/architecture/` (AST-based) rather than tach,
# because per-slice module declarations would balloon this file.
#
# Run: `uv run tach check` (also wired into pre-commit and CI).
# Visualize: `uv run tach show` opens the dependency graph.

exclude = ["tests", "**/__pycache__", ".venv", "build", "dist"]
source_roots = ["src"]

# Foundation. Depends on nothing in the cora package.
#
# Phase-8d hardening retired the prior lazy `cora.trust` import
# from `infrastructure/deps.py`. The Kernel data class now lives
# in `cora.infrastructure.kernel` (zero BC imports) and the
# authorize factory is injected into `build_kernel` via the
# composition root (`cora.api.main` -> `cora.trust.authorize_factory.
# build_authorize`). Foundation is back to depending on nothing.
[[modules]]
path = "cora.infrastructure"
depends_on = []

# Aggregate kernels: declared as their own modules so other BCs
# can target them with `depends_on = ["cora.X.aggregates"]` while
# `cora.X.features` stays implicitly off-limits to outsiders.
[[modules]]
path = "cora.access.aggregates"
depends_on = ["cora.infrastructure"]

[[modules]]
path = "cora.data.aggregates"
depends_on = ["cora.infrastructure"]

[[modules]]
path = "cora.decision.aggregates"
depends_on = ["cora.infrastructure"]

[[modules]]
path = "cora.equipment.aggregates"
depends_on = ["cora.infrastructure"]

[[modules]]
path = "cora.recipe.aggregates"
depends_on = ["cora.infrastructure", "cora.equipment.aggregates"]

[[modules]]
path = "cora.run.aggregates"
depends_on = ["cora.infrastructure"]

[[modules]]
path = "cora.subject.aggregates"
depends_on = ["cora.infrastructure"]

[[modules]]
path = "cora.trust.aggregates"
depends_on = ["cora.infrastructure"]

# Bounded contexts. Each BC depends on its own aggregate kernel,
# infrastructure, and any sibling aggregate kernels it integrates
# with at handler-load time (cross-aggregate validation pattern).
[[modules]]
path = "cora.access"
depends_on = ["cora.infrastructure", "cora.access.aggregates"]

# Data BC depends on its own aggregates plus Run + Subject aggregate
# kernels for cross-aggregate validation at register_dataset time
# (DatasetRegistrationContext pre-loads producing_run + linked
# subject + each derived_from Dataset).
[[modules]]
path = "cora.data"
depends_on = [
    "cora.infrastructure",
    "cora.data.aggregates",
    "cora.run.aggregates",
    "cora.subject.aggregates",
]

# Decision BC depends on its own aggregates plus Access aggregate
# kernel for actor existence-check at register_decision time
# (DecisionRegistrationContext pre-loads the Actor + optional
# parent Decision).
[[modules]]
path = "cora.decision"
depends_on = [
    "cora.infrastructure",
    "cora.decision.aggregates",
    "cora.access.aggregates",
]

[[modules]]
path = "cora.equipment"
depends_on = ["cora.infrastructure", "cora.equipment.aggregates"]

[[modules]]
path = "cora.subject"
depends_on = ["cora.infrastructure", "cora.subject.aggregates"]

[[modules]]
path = "cora.trust"
depends_on = ["cora.infrastructure", "cora.trust.aggregates"]

[[modules]]
path = "cora.recipe"
depends_on = [
    "cora.infrastructure",
    "cora.recipe.aggregates",
    "cora.equipment.aggregates",
]

[[modules]]
path = "cora.run"
depends_on = [
    "cora.infrastructure",
    "cora.run.aggregates",
    "cora.equipment.aggregates",
    "cora.recipe.aggregates",
    "cora.subject.aggregates",
]

# API entrypoint composes every BC.
[[modules]]
path = "cora.api"
depends_on = [
    "cora.infrastructure",
    "cora.access",
    "cora.data",
    "cora.decision",
    "cora.equipment",
    "cora.recipe",
    "cora.run",
    "cora.subject",
    "cora.trust",
]
