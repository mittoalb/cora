{% extends "main.html" %}

{% block extrahead %}
  {{ super() }}
  <link rel="preload" as="image" href="{{ 'assets/hero-bloom.webp' | url }}" fetchpriority="high">
{% endblock %}

{% block tabs %}
  {{ super() }}
  <div class="cora-hero cora-hero--editorial">
    <img src="{{ 'assets/hero-bloom.webp' | url }}" alt="" class="cora-hero__image" fetchpriority="high">
    <div class="cora-hero__layer">
      <div class="md-grid cora-hero__inner">
        <div class="cora-hero__kicker">Vol. 0 &nbsp;&middot;&nbsp; 2026</div>
        <h1 class="cora-hero__masthead">CORA</h1>
        <p class="cora-hero__tagline">An agent-native operations platform for large-scale research facilities.</p>
      </div>
      <nav class="cora-hero__strip" aria-label="Current pilot">
        <div class="md-grid cora-hero__strip-inner">
          <span>Pilot</span>
          <span aria-hidden="true">&middot;</span>
          <a href="{{ 'projects/35-bm/' | url }}">35-BM at APS &rarr;</a>
        </div>
      </nav>
    </div>
  </div>
{% endblock %}
