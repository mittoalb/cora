site_name: CORA
site_description: The system of record for the experiment, at large-scale research facilities
site_url: https://xmap.github.io/cora/
site_author: Doga Gursoy

repo_url: https://github.com/xmap/cora
repo_name: xmap/cora
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github

