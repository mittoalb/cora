site_name: CORA
site_description: An agent-native operations platform for large-scale research facilities
site_url: https://xmap.github.io/cora/
site_author: Doga Gursoy

repo_url: https://github.com/xmap/cora
repo_name: xmap/cora
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture:
    - architecture/index.md
    - Model: architecture/model.md
    - State: architecture/state.md
    - Surfaces: architecture/surfaces.md
    - Standards: architecture/standards.md
  - Stack:
    - stack/index.md
    - Backend: stack/backend.md
    - Frontend: stack/frontend.md
    - Data: stack/data.md
    - Auth: stack/auth.md
    - Observability: stack/observability.md
    - Operations: stack/operations.md
    - Deferred: stack/deferred.md
  - Projects:
    - projects/index.md
    - 35-BM:
      - projects/35-bm/index.md
      - Ground: projects/35-bm/ground.md
      - Scope: projects/35-bm/scope.md
      - Walk: projects/35-bm/walk.md
      - Capabilities: projects/35-bm/capabilities.md
  - Reference:
    - reference/index.md
    - Workflow: reference/workflow.md
    - Layout: reference/layout.md
    - Modeling: reference/modeling.md
    - Patterns: reference/patterns.md
    - Runtime: reference/runtime.md
  - Glossary:
    - glossary/index.md
    - Architecture: glossary/architecture.md
    - Events: glossary/events.md
    - Surfaces: glossary/surfaces.md
    - Standards: glossary/standards.md
    - Authz: glossary/authz.md
    - Recipe ladder: glossary/ladder.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
      toc_depth: 2

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/hero-fade.js
  - javascripts/nav-transition.js
  - javascripts/section-reveal.js
  - javascripts/nav-theme.js

plugins:
  - search

hooks:
  - scripts/mkdocs_hooks.py

# Note: contributing.md is staged into docs/ at build time from the repo
# root CONTRIBUTING.md by .github/workflows/docs.yml (see scripts/stage_docs.py).
# For local `mkdocs serve` it is absent and mkdocs will warn; build with
# `make docs-build` to stage it first. index.md is hand-crafted and lives in docs/.
strict: false
