site_name: CORA
site_description: A unified operations platform for large-scale research facilities
site_url: https://xmap.github.io/cora/
site_author: Doga Gursoy

repo_url: https://github.com/xmap/cora
repo_name: xmap/cora
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Stack: stack.md
  - Glossary: glossary.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search

hooks:
  - scripts/mkdocs_hooks.py

# Note: index.md and contributing.md are staged into docs/ at build
# time from the repo root by .github/workflows/docs.yml. For local
# `mkdocs serve` they are absent and mkdocs will warn; build with
# `make docs-build` to stage them first.
strict: false
