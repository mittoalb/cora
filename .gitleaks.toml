# Gitleaks configuration for CORA.
#
# Inherit the default rule set; only add path-scoped allowlists for
# files whose normal content shape (high-entropy hash strings) trips
# the entropy-based "generic-api-key" detector.

[extend]
useDefault = true

[allowlist]
description = "Allowlist machine-generated content that resembles high-entropy secrets."
# Atlas migration sums are SHA256 base64 hashes that legitimately
# look like API keys to entropy-based detectors. Module documentation
# pages carry literal `Idempotency-Key: <uuid>` headers in REST/MCP
# examples; the UUID body trips the entropy detector. Contract tests
# for slices that take an Idempotency-Key header carry a deterministic
# test-key string and a UUID in the URL path; both trip the detector.
paths = [
    '''infra/atlas/migrations/atlas\.sum''',
    '''docs/architecture/modules/.*\.md''',
    '''apps/api/tests/contract/test_regenerate_run_debrief_endpoint\.py''',
]
