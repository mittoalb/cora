    - baseline
    source_class: apstools.devices.motor_factory.mb_creator
  - name: laser_optics
    family: LaserOptics
    pv: '3idxps1:'
    enclosure: 3-ID-X
    new: true
    confirm: 'axes unresolved: pv is the device prefix, per-axis PVs need confirm;
      family is the ophyd class name ''LaserOptics''; needs a CORA Family; in_position:
      non-literal or absent component suffix; out_position: non-literal or absent
      component suffix; tolerance: non-literal or absent component suffix; settle_time:
      non-literal or absent component suffix; out_status: non-literal or absent component
      suffix'
    labels:
    - baseline
    source_class: id3c.devices.laser_optics.LaserOptics
  - name: IC0_B_VDC
