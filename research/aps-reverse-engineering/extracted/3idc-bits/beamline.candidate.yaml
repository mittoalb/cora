  - name: IC0_C_VDC
    family: EpicsSignalRO
    new: true
    confirm: no prefix and no resolvable axes; family is the ophyd class name 'EpicsSignalRO';
      needs a CORA Family; enclosure unresolved from prefix or labels; ophyd class
      'EpicsSignalRO' not found in devices/*.py
