# CANDIDATE beamline descriptor: machine-extracted from a *-bits repo, NOT authoritative.
# Every device carries new: true and a confirm note. Grouping by stage is a placeholder;
# Family suggestions, enclosures, and per-axis PVs all need human curation and, for any
# new Family, the naming-r3 gate. Do not copy into deployments/ without review.

beamline:
  name: 3-ID
  facility: aps
  tier: Unit
  source: unknown-pending-confirmation
enclosures:
- name: 3-ID-A
  facility_code: aps
  confirm: enclosure inferred from PV prefix or station label
- name: 3-ID-S
  facility_code: aps
  confirm: enclosure inferred from PV prefix or station label
- name: 3-ID-X
  facility_code: aps
  confirm: enclosure inferred from PV prefix or station label
source:
  stage: source
  intro: Candidate grouping by inferred stage; grouping and stage need confirm.
  devices:
  - name: shutterc
    family: Shutter
    pv: '3ida:shutterC:'
    enclosure: 3-ID-A
    new: true
    confirm: 'axes unresolved: pv is the device prefix, per-axis PVs need confirm;
      ophyd class ''ApsPssShutter'' not found in devices/*.py'
    labels:
    - shutters
    - baseline
    source_class: apstools.devices.ApsPssShutter
  - name: sample_stage
    family: mb_creator
    new: true
    confirm: 'no prefix and no resolvable axes; family is the ophyd class name ''mb_creator'';
      needs a CORA Family; enclosure unresolved from prefix or labels; factory device
      (ad_creator): plugins and file paths need a human; ophyd class ''mb_creator''
      not found in devices/*.py'
    labels:
    - baseline
    source_class: apstools.devices.motor_factory.mb_creator
