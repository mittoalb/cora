name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "scripts/stage_docs.py"
  workflow_dispatch:

# Allow only one concurrent deployment, no cancel-in-progress so a
# late deploy still finishes (matches the pages-action recommendation).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install MkDocs Material
        run: pip install --quiet "mkdocs-material==9.5.49"

      - name: Stage README and CONTRIBUTING into docs/
        run: python scripts/stage_docs.py

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
