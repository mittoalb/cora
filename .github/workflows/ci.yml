name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      # GitHub Actions cleans up containers when the job ends, so the
      # testcontainers Ryuk reaper sidecar adds startup overhead and
      # occasional flakes for no benefit. Disabled per upstream guidance
      # for ephemeral CI environments.
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Sync dependencies (locked)
        run: uv sync --locked --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check src tests

      - name: Format check (ruff format)
        run: uv run ruff format --check src tests

      - name: Typecheck (pyright strict)
        run: uv run pyright src tests

      - name: Test (pytest)
        run: uv run pytest

  migrations:
    name: Migrations (atlas hash + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/atlas

    steps:
      - uses: actions/checkout@v4

      - name: Install Atlas
        uses: ariga/setup-atlas@v0

      - name: Verify atlas.sum is up to date
        run: |
          atlas migrate hash
          if ! git diff --quiet atlas.sum; then
            echo "::error::atlas.sum is stale. Run 'make migrate-hash' and commit." >&2
            git diff atlas.sum
            exit 1
          fi

      - name: Lint migrations against dev database
        run: atlas migrate lint --dev-url "docker://pgvector/pg17/dev" --latest 1
