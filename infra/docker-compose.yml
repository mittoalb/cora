services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: cora-postgres
    environment:
      POSTGRES_USER: cora
      POSTGRES_PASSWORD: cora
      POSTGRES_DB: cora
    ports:
      - "5432:5432"
    volumes:
      - cora-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cora -d cora"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cora-pg-data:
